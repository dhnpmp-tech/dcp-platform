        - ProviderApiKey: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
        - in: query
          name: severity
          schema:
            type: string
      responses:
        '200':
          description: Daemon events list

  /api/providers/available:
    get:
      tags: [Providers]
      summary: Public marketplace list of live online providers
