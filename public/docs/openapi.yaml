  # ─── Jobs ───────────────────────────────────────────────────────────────────

  /api/jobs/submit:
    post:
      tags: [Jobs]
      summary: Submit a compute job
      description: |
        Validates renter balance, deducts estimated cost as a pre-pay hold, assigns
        provider, and queues the job.

        Enforced controls:
        - Rate limit: **10 submissions/min per renter API key**
        - Balance gate: renter `balance_halala` must be `> 0`
        - Quotas: `daily_jobs_limit` and `monthly_spend_limit_halala` (from `renter_quota`)

        **Supported job types and cost rates (halala/min):**
        | Type | Rate |
        |------|------|
        | `llm-inference` | 15 |
        | `training` | 25 |
        | `rendering` | 20 |
        | `image_generation` | 20 |
        | `vllm_serve` | 20 |
        | `benchmark` | 10 |
        | `custom_container` | 10 |
      security:
        - RenterApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_type, duration_minutes]
              properties:
                provider_id:
                  type: integer
                  minimum: 1
                  nullable: true
                job_type:
                  type: string
                  enum: [image_generation, llm-inference, llm_inference, rendering, training, benchmark, custom_container, vllm_serve]
                  example: image_generation
                duration_minutes:
                  type: number
                  minimum: 0.01
                  maximum: 1440
                  default: 10
                  description: Estimated runtime. Used for pre-pay cost calculation.
                params:
                  type: object
                  description: |
                    Job-specific parameters. For supported types, the API auto-generates
                    the task payload from these params (no raw Python task required).

                    **image_generation params:**
                    - `prompt` (string)
                    - `negative_prompt` (string)
                    - `steps` (int, 5–100)
                    - `width` / `height` (int, 256–1024)
                    - `seed` (int)
                    - `model` (enum — see allowed SD models)

                    **llm-inference params:**
                    - `prompt` (string)
                    - `max_tokens` (int, 32–4096)
                    - `temperature` (float, 0.1–2.0)
                    - `model` (enum — see allowed LLM models)
                container_spec:
                  type: object
                  nullable: true
                  description: Container execution profile. `image_type` is required after normalization.
                gpu_requirements:
                  type: object
                  nullable: true
                  description: Optional GPU filter (min_vram_gb, gpu_model, etc.)
                max_duration_seconds:
                  type: integer
                  default: 1800
                  description: Hard timeout. Job is killed if it exceeds this.
                priority:
                  type: integer
                  enum: [1, 2, 3]
                  default: 2
                  description: "1=high, 2=normal, 3=low"
            example:
              provider_id: 42
              job_type: llm_inference
              duration_minutes: 3
              max_duration_seconds: 180
              container_spec:
                image_type: vllm-serve
              params:
                model: TinyLlama/TinyLlama-1.1B-Chat-v1.0
                prompt: Summarize DCP in three bullets.
      responses:
        '201':
          description: Job submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  job:
                    type: object
                    properties:
                      id:
                        type: integer
                      job_id:
                        type: string
                      provider_id:
                        type: integer
                        nullable: true
                      renter_id:
                        type: integer
                      job_type:
                        type: string
                      status:
                        type: string
                        enum: [pending, queued]
                      submitted_at:
                        type: string
                        format: date-time
                      duration_minutes:
                        type: number
                      cost_halala:
                        type: integer
                      max_duration_seconds:
                        type: integer
                      timeout_at:
                        type: string
                        nullable: true
                      gpu_requirements:
                        type: object
                        nullable: true
                      container_spec:
                        type: object
                      workspace_volume_name:
                        type: string
                      checkpoint_enabled:
                        type: boolean
                      task_spec_signed:
                        type: boolean
                      priority:
                        type: integer
                      pricing_class:
                        type: string
                      prewarm_requested:
                        type: boolean
                      queue_position:
                        type: integer
                        nullable: true
                  queued:
                    type: boolean
                  message:
                    type: string
              example:
                success: true
                job:
                  id: 9001
                  job_id: job-1742671800000-ab12cd
                  provider_id: 42
                  renter_id: 101
                  job_type: llm_inference
                  model: TinyLlama/TinyLlama-1.1B-Chat-v1.0
                  status: pending
                  submitted_at: "2026-03-22T19:30:00.000Z"
                  duration_minutes: 3
                  cost_halala: 45
                  max_duration_seconds: 180
                  timeout_at: "2026-03-22 20:00:00.000"
                  gpu_requirements: null
                  container_spec:
                    image_type: vllm-serve
                    pricing_class: standard
                  workspace_volume_name: dcp-job-job-1742671800000-ab12cd
                  checkpoint_enabled: false
                  task_spec_signed: true
                  priority: 2
                  pricing_class: standard
                  prewarm_requested: false
                  queue_position: null
        '400':
          description: Invalid request (missing job_type, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '402':
          description: Insufficient balance or zero wallet balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Renter submission rate limit or quota exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: No providers available

  /api/jobs/{job_id}:
    get:
      tags: [Jobs]
      summary: Get job status and details
      security:
        - RenterApiKey: []
        - ProviderApiKey: []
        - AdminToken: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
          description: Job UUID
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '403':
          description: Access denied (not your job)
        '404':
          description: Job not found

  /api/jobs/{job_id}/output:
    get:
      tags: [Jobs]
      summary: Fetch job output
      description: Returns the job result payload. For `image_generation`, includes base64-encoded PNG.
      security:
        - RenterApiKey: []
        - ProviderApiKey: []
        - AdminToken: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Job still running or queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  progress_phase:
                    type: string
                    nullable: true
                  job_id:
                    type: string
        '200':
          description: Job output
          content:
            application/json:
              schema:
                type: object
                description: Varies by job_type. For images contains `data` (base64 PNG). For text contains `response`.
        '410':
          description: Job failed or was cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [failed, cancelled]
                  error:
                    type: string
                  job_id:
                    type: string
        '404':
          description: Job not found or no output yet

  /api/jobs/{job_id}/output/{format}:
    get:
      tags: [Jobs]
      summary: Fetch job output in a specific format
      security:
        - RenterApiKey: []
        - ProviderApiKey: []
        - AdminToken: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
        - in: path
          name: format
          required: true
          schema:
            type: string
            enum: [json, png, raw]
      responses:
        '200':
          description: Job output in requested format

  /api/jobs/{job_id}/logs:
    get:
      tags: [Jobs]
      summary: Get job execution logs
      description: Returns stored log entries. Use `?attempt=N` to retrieve logs from a specific execution attempt (see `/api/jobs/{id}/history`).
      security:
        - RenterApiKey: []
        - ProviderApiKey: []
        - AdminToken: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
        - in: query
          name: attempt
          required: false
          schema:
            type: integer
            minimum: 1
          description: Attempt number. Omit for latest attempt.
      responses:
        '200':
          description: Log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                  attempt:
                    type: integer
                    description: Attempt number these logs belong to
    post:
      tags: [Jobs]
      summary: Daemon appends log entries for a job
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                logs:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Logs appended

  /api/jobs/{job_id}/progress:
    post:
      tags: [Jobs]
      summary: Daemon reports job progress
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                progress_pct:
                  type: number
                  minimum: 0
                  maximum: 100
                phase:
                  type: string
                  description: Phase marker (e.g. downloading_model, generating)
      responses:
        '200':
          description: Progress recorded

  /api/jobs/{job_id}/endpoint-ready:
    post:
      tags: [Jobs]
      summary: Daemon signals that a long-running endpoint is ready
      description: Used by `vllm_serve` jobs to announce the inference endpoint URL.
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                endpoint_url:
                  type: string
                  format: uri
      responses:
        '200':
          description: Endpoint URL stored

  /api/jobs/{job_id}/complete:
    post:
      tags: [Jobs]
      summary: Mark job as complete (daemon)
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                result:
