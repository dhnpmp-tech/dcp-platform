  # ──────────────────────────────────────────────────────────────────────────────
  # Container Registry (DCP-315/319)
  # ──────────────────────────────────────────────────────────────────────────────

  /api/containers/registry:
    get:
      tags: [Containers]
      summary: List approved Docker images
      description: |
        Returns all images approved for use in DCP jobs. Each entry includes
        the image tag, description, associated job type, and Trivy scan status.
        No authentication required — public endpoint.
      responses:
        '200':
          description: Approved image registry
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        image:
                          type: string
                          example: dc1/llm-worker:latest
                        description:
                          type: string
                        job_type:
                          type: string
                          example: llm_inference
                        scan_status:
                          type: string
                          enum: [pending, clean, flagged, failed]
                        scan_at:
                          type: string
                          format: date-time
                          nullable: true
                        approved_at:
                          type: string
                          format: date-time
                  total:
                    type: integer

  /api/admin/containers/approve-image:
    post:
      tags: [Containers, Admin]
      summary: Approve a custom Docker image
      description: |
        Adds a Docker image to the approved registry. Optionally triggers a
        Trivy security scan before final approval. Once approved, the image
        becomes available for `custom_container` jobs.
      security:
        - AdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  example: myorg/custom-worker:v1.2
                  description: Fully-qualified Docker image reference
                description:
                  type: string
                  description: Human-readable description of the image
                job_type:
                  type: string
                  description: Job type this image is intended for
                scan_first:
                  type: boolean
                  default: true
                  description: Run Trivy scan before approval. If scan finds CRITICAL vulnerabilities, approval is blocked.
      responses:
        '201':
          description: Image approved (or queued for scan)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  image:
                    type: string
                  status:
                    type: string
                    enum: [approved, scan_pending]
                  message:
                    type: string
        '400':
          description: Missing image field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Image already in registry

  /api/admin/containers/scan-image:
    post:
      tags: [Containers, Admin]
      summary: Trigger a Trivy security scan on an image
      description: |
        Queues a Trivy vulnerability scan for the specified image. Results are
        stored and accessible via `/api/admin/containers/security-status`.
        Scan runs asynchronously — poll the security-status endpoint for results.
      security:
        - AdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  example: dc1/llm-worker:latest
      responses:
        '202':
          description: Scan queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  image:
                    type: string
                  scan_id:
                    type: string
                  message:
                    type: string
                    example: Trivy scan queued. Check /api/admin/containers/security-status for results.
        '400':
          description: Missing image field

  /api/admin/containers/security-status:
    get:
      tags: [Containers, Admin]
      summary: Container security scan dashboard
      description: |
        Returns scan results for all registry images. Highlights images with
        CRITICAL or HIGH severity CVEs. Use this to audit the registry before
        approving new images.
      security:
        - AdminToken: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, clean, flagged, failed]
          description: Filter by scan status
        - in: query
          name: severity
          schema:
            type: string
            enum: [CRITICAL, HIGH, MEDIUM, LOW]
          description: Return only images with findings at or above this severity
      responses:
        '200':
          description: Security scan summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                    properties:
                      total_images:
                        type: integer
                      clean:
                        type: integer
                      flagged:
                        type: integer
                      pending:
                        type: integer
                  images:
                    type: array
                    items:
                      type: object
                      properties:
                        image:
                          type: string
                        scan_status:
                          type: string
                        scanned_at:
                          type: string
                          format: date-time
                          nullable: true
                        critical_cves:
                          type: integer
                        high_cves:
                          type: integer
                        findings_summary:
                          type: string
                          nullable: true

  # ──────────────────────────────────────────────────────────────────────────────
  # Job Execution — History, Streaming Logs, Queue Status, Retry, Pause/Resume
  # (DCP-314, DCP-316, DCP-317, Sprint 20)
  # ──────────────────────────────────────────────────────────────────────────────

  /api/jobs/{job_id}/history:
    get:
      tags: [Jobs]
      summary: Job execution attempt history
      description: |
        Returns a log of all execution attempts for a job. Each entry records
        the attempt number, start/end times, exit status, and error message.
        Useful for debugging retry scenarios.
      security:
        - RenterApiKey: []
        - AdminToken: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
          description: Job UUID or numeric ID
      responses:
        '200':
          description: Execution attempt history
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                  attempts:
                    type: array
                    items:
                      type: object
                      properties:
                        attempt:
                          type: integer
                          description: Attempt number (1-based)
                        provider_id:
                          type: integer
                        started_at:
                          type: string
                          format: date-time
                        ended_at:
                          type: string
                          format: date-time
                          nullable: true
                        status:
                          type: string
                          enum: [running, completed, failed, timeout]
                        error:
                          type: string
                          nullable: true
                        duration_seconds:
                          type: number
                          nullable: true
        '404':
          description: Job not found

  /api/jobs/{job_id}/logs/stream:
    get:
      tags: [Jobs]
      summary: Stream job execution logs (SSE)
      description: |
        Opens a Server-Sent Events stream for live job log output. Each event
        contains a single log line. The stream closes when the job reaches a
        terminal state (`completed`, `failed`, `cancelled`).

        **Client usage:**
        ```javascript
        const source = new EventSource(
          `https://api.dcp.sa/api/jobs/${jobId}/logs/stream`,
          { headers: { 'x-renter-key': apiKey } }
        );
        source.onmessage = (e) => console.log(e.data);
        ```
      security:
        - RenterApiKey: []
        - ProviderApiKey: []
        - AdminToken: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream of log lines
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Each event: `data: <log line>\n\n`
                  Terminal event: `data: [DONE]\n\n`
        '404':
          description: Job not found

  /api/jobs/queue/status:
    get:
      tags: [Jobs]
      summary: Job queue depth by compute type
      description: |
        Returns the current number of queued and running jobs broken down by
        `job_type`. Use this to estimate wait times before submitting a job.
        No authentication required — public endpoint.
      responses:
        '200':
          description: Queue depth per job type
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue:
                    type: array
                    items:
                      type: object
                      properties:
                        job_type:
                          type: string
                          example: llm_inference
                        queued:
                          type: integer
                          description: Jobs waiting for a provider
                        running:
                          type: integer
                          description: Jobs currently executing
                        avg_wait_seconds:
                          type: number
                          nullable: true
                          description: Rolling average queue wait time
                  total_queued:
                    type: integer
                  total_running:
                    type: integer
                  updated_at:
                    type: string
                    format: date-time

  /api/jobs/{job_id}/retry:
    post:
      tags: [Jobs]
      summary: Retry a failed job
      description: |
        Re-queues a `failed` job for execution. The renter's balance is checked
        against the original estimated cost — a new hold is placed. The job
        retains its original `job_id` but increments its attempt counter (visible
        in `/api/jobs/{id}/history`).

        Only jobs in `failed` status can be retried. Max 3 retry attempts.
      security:
        - RenterApiKey: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job re-queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  job_id:
                    type: string
                  attempt:
                    type: integer
                    description: New attempt number
                  status:
                    type: string
                    enum: [pending, queued]
                  cost_halala:
                    type: integer
                  new_balance_halala:
                    type: integer
        '400':
          description: Job is not in failed status, or max retry attempts reached
        '402':
          description: Insufficient balance for retry
        '404':
          description: Job not found

  /api/jobs/{job_id}/pause:
    post:
      tags: [Jobs]
      summary: Pause a running job (checkpoint container)
      description: |
        Sends a pause signal to the provider daemon, which uses `docker checkpoint`
        to snapshot the container state to disk. The job transitions to `paused`.
        Resume with `POST /api/jobs/{id}/resume`.

        Only supported for jobs using checkpoint-compatible images.
      security:
        - RenterApiKey: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pause signal sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  job_id:
                    type: string
                  status:
                    type: string
                    example: pausing
                  message:
                    type: string
        '400':
          description: Job is not in running status or image does not support checkpointing
        '404':
          description: Job not found

  /api/jobs/{job_id}/resume:
    post:
      tags: [Jobs]
      summary: Resume a paused job (restore from checkpoint)
      description: |
        Sends a resume signal to the provider daemon, which restores the container
        from its checkpoint and continues execution. The job transitions back to
        `running`.
      security:
        - RenterApiKey: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resume signal sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  job_id:
                    type: string
                  status:
                    type: string
                    example: resuming
                  message:
                    type: string
        '400':
          description: Job is not in paused status
        '404':
          description: Job not found

  # ──────────────────────────────────────────────────────────────────────────────
  # vLLM Managed Inference (DCP-333)
  # Note: vLLM router is mounted at /v1 in Express (not /api/vllm).
  # Next.js rewrites /v1/* → backend /v1/* for external access.
  # ──────────────────────────────────────────────────────────────────────────────

  /v1/router/policies:
    get:
      tags: [OpenAI-Compatible]
      summary: List DCP inference routing policy readiness
      description: |
        Returns a read-only catalog of DCP inference routing policies. This
        endpoint does not enable request-selectable routing yet; it describes
        which Fireworks-style router policies are live, telemetry-only,
        catalog-only, gated, or not enabled.
      responses:
        '200':
          description: Read-only routing policy catalog.
          content:
            application/json:
              schema:
                type: object
                required: [object, version, default_policy, request_selectable, data]
                properties:
                  object:
                    type: string
                    example: list
                  version:
                    type: string
                    example: dcp.inference_routing_policies.v1
                  default_policy:
                    type: string
                    example: balanced
                  request_policy_parameter:
                    nullable: true
                    description: Null until request-selectable routing policies are enabled.
                    example: null
                  request_selectable:
                    type: boolean
                    example: false
                  generated_at:
                    type: string
                    format: date-time
                  data:
                    type: array
                    items:
                      type: object
                      required: [id, label, status, available, request_selectable, current_behavior, signals, next]
                      properties:
                        id:
                          type: string
                          enum: [balanced, lowest_latency, cheapest, saudi_only, coding, arabic]
                        label:
                          type: string
                        status:
                          type: string
                          enum: [available, telemetry_gate_only, catalog_only, gated, not_enabled]
                        available:
                          type: boolean
                        default:
                          type: boolean
                        request_selectable:
                          type: boolean
                        current_behavior:
                          type: string
                        signals:
                          type: array
                          items:
                            type: string
                        runtime:
                          type: object
                          additionalProperties: true
                        next:
                          type: string

  /v1/prompt-cache/readiness:
    get:
      tags: [OpenAI-Compatible]
      summary: Get DCP prompt-cache readiness
      description: |
        Returns the prompt-cache measurement gate for OpenAI-compatible
        inference. The contract is read-only and explicitly distinguishes
        hash-only cached-prefix measurement from future cache discounts or
        provider KV-cache control.
      responses:
        '200':
          description: Prompt-cache readiness contract.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptCacheReadiness'

  /v1/models:
    get:
      tags: [vLLM]
      summary: List available vLLM models
      description: |
        Returns the OpenAI-compatible model catalog for managed inference via
        `/v1/chat/completions`. Each row includes current servability, provider
        count, context length, capability flags, and DCP billing metadata in
        halala/SAR/USD per 1M tokens.

        No authentication required.
      responses:
        '200':
          description: Available model list
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: mistralai/Mistral-7B-Instruct-v0.2
                        object:
                          type: string
                          example: model
                        context_length:
                          type: integer
                          example: 32768
                        max_output_tokens:
                          type: integer
                          example: 4096
                        provider_count:
                          type: integer
                          example: 2
                        max_vram_gb:
                          type: number
                          example: 24
                        available:
                          type: boolean
                          description: True if a provider is currently serving this model
                        status:
                          type: string
                          enum: [available, no_providers]
                          example: available
                        modalities:
                          type: array
                          items:
                            type: string
                          example: [text]
                        pricing:
                          type: object
                          properties:
                            prompt_tokens:
                              type: string
                              description: OpenAI/OpenRouter-compatible USD per prompt token.
                              example: "0.000000"
                            completion_tokens:
                              type: string
                              description: OpenAI/OpenRouter-compatible USD per completion token.
                              example: "0.000000"
                            usd_per_1m_input_tokens:
                              type: string
                              example: "0.213333"
                            usd_per_1m_output_tokens:
                              type: string
                              example: "0.400000"
                            sar_per_1m_input_tokens:
                              type: string
                              example: "0.8000"
                            sar_per_1m_output_tokens:
                              type: string
                              example: "1.5000"
                            halala_per_1m_input_tokens:
                              type: integer
                              example: 80
                            halala_per_1m_output_tokens:
                              type: integer
                              example: 150
                            billing_unit:
                              type: string
                              example: per_1m_tokens
                            source:
                              type: string
                              enum: [model_registry, cost_rates]
                              example: model_registry
                        capability_flags:
                          type: object
                          properties:
                            chat_completions:
                              type: boolean
                            streaming:
                              type: boolean
                            tool_calling:
                              type: boolean
                            reasoning:
                              type: boolean
                            code_generation:
                              type: boolean
                            embeddings:
                              type: boolean
                            image_generation:
                              type: boolean
                            multilingual:
                              type: boolean
                            dedicated_deployment:
                              type: boolean
                              description: Product-available flag. False until dedicated deployments can route serving traffic.
                            lora:
                              type: boolean
                              description: Product-available flag. False until adapter serving can route traffic.
                            prompt_caching:
                              type: boolean
                              description: Product-available flag. False until prompt-cache discounts are enabled.
                            batch:
                              type: boolean
                              description: Product-available flag. False until batch execution and settlement are enabled.
                        feature_readiness:
                          type: object
                          description: Additive readiness metadata for advanced Fireworks-style rails. Product-available booleans above remain false until the rail can route traffic or alter billing safely.
                          properties:
                            version:
                              type: string
                              example: dcp.model_feature_readiness.v1
                            dedicated_deployment:
                              type: object
                              properties:
                                status:
                                  type: string
                                  enum: [gated, not_applicable]
                                  example: gated
                                available:
                                  type: boolean
                                  example: false
                                api_available:
                                  type: boolean
                                  example: true
                                serving_enabled:
                                  type: boolean
                                  example: false
                                route_traffic:
                                  type: boolean
                                  example: false
                                load_proof_required:
                                  type: boolean
                                  example: true
                                next:
                                  type: string
                                  example: create_deployment_then_attach_vllm_load_proof
                            lora:
                              type: object
                              properties:
                                status:
                                  type: string
                                  enum: [metadata_only, not_applicable]
                                  example: metadata_only
                                available:
                                  type: boolean
                                  example: false
                                adapter_registry_api:
                                  type: boolean
                                  example: true
                                training_job_api:
                                  type: boolean
                                  example: true
                                serving_enabled:
                                  type: boolean
                                  example: false
                                route_traffic:
                                  type: boolean
                                  example: false
                                load_proof_required:
                                  type: boolean
                                  example: true
                                next:
                                  type: string
                                  example: run_gpu_training_proof_then_enable_adapter_serving
                            prompt_caching:
                              type: object
                              properties:
                                status:
                                  type: string
                                  enum: [measurement_only, not_applicable]
                                  example: measurement_only
                                available:
                                  type: boolean
                                  example: false
                                usage_metadata:
                                  type: boolean
                                  example: true
                                billing_discount:
                                  type: boolean
                                  example: false
                                settlement_enabled:
                                  type: boolean
                                  example: false
                                next:
                                  type: string
                                  example: validate_hit_measurement_before_discount
                            batch:
                              type: object
                              properties:
                                status:
                                  type: string
                                  enum: [api_metadata_only, not_applicable]
                                  example: api_metadata_only
                                available:
                                  type: boolean
                                  example: false
                                api_available:
                                  type: boolean
                                  example: true
                                execution_enabled:
                                  type: boolean
                                  example: false
                                result_downloads:
                                  type: boolean
                                  example: false
                                discount_enabled:
                                  type: boolean
                                  example: false
                                next:
                                  type: string
                                  example: enable_worker_result_artifact_and_settlement

  /v1/complete:
    post:
      tags: [vLLM]
      summary: Synchronous LLM completion
      description: |
        Submits a prompt to a managed vLLM inference endpoint and returns the
        full response synchronously. Internally submits an `llm_inference` job
        and waits for completion (max 120s timeout).

        For streaming output, use `POST /v1/complete/stream`.
      security:
        - RenterApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, prompt]
              properties:
                model:
                  type: string
                  example: mistralai/Mistral-7B-Instruct-v0.2
                  description: Model ID from `/v1/models`
                prompt:
                  type: string
                  example: Explain quantum computing in simple terms.
                max_tokens:
                  type: integer
                  default: 512
                  minimum: 1
                  maximum: 4096
                temperature:
                  type: number
                  default: 0.7
                  minimum: 0
                  maximum: 2
                top_p:
                  type: number
                  default: 1
                  minimum: 0
                  maximum: 1
                stop:
                  type: array
                  items:
                    type: string
                  description: Stop sequences
                static_prefix:
                  description: Optional static prompt prefix used only for prompt-cache measurement. No discount is applied in this phase.
                  oneOf:
                    - type: string
                    - type: object
                    - type: array
                prompt_cache:
                  type: object
                  description: Optional prompt-cache measurement hints. These fields do not reduce billing yet.
                  properties:
                    static_prefix:
                      description: Explicit static prefix to hash for prompt-cache accounting.
                      oneOf:
                        - type: string
                        - type: object
                        - type: array
                    session_id:
                      type: string
                      description: Optional session scope for the prompt-cache key. Stored only as a hash in usage metadata.
                provider_id:
                  type: integer
                  nullable: true
                  description: Pin to a specific provider. Omit to auto-select.
                routing_policy:
                  type: string
                  enum: [balanced]
                  description: |
                    Optional explicit router policy. Only `balanced` is
                    accepted today and preserves current provider selection.
                    Other policies listed by `/v1/router/policies` return a
                    structured 400 until they become request-selectable.
      responses:
        '200':
          description: Completion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Completion ID (same as job_id)
                  model:
                    type: string
                  choices:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        text:
                          type: string
                        finish_reason:
                          type: string
                          enum: [stop, length, timeout]
                  usage:
                    type: object
                    properties:
                      prompt_tokens:
                        type: integer
                      completion_tokens:
                        type: integer
                      total_tokens:
                        type: integer
                      prompt_cache:
                        type: object
                        description: Prompt-cache measurement metadata. Billing is unchanged until cached-input rates and settlement tests land.
                        properties:
                          version:
                            type: string
                            example: dcp.prompt_cache.v1
                          status:
                            type: string
                            enum: [miss_measured, hit_measured_no_discount, no_static_prefix, legacy_prompt_prefix_unset]
                            example: miss_measured
                          eligible:
                            type: boolean
                            example: true
                          cache_key:
                            type: string
                            nullable: true
                            example: pc_0123456789abcdef0123456789abcdef01234567
                          cached_input_tokens:
                            type: integer
                            example: 0
                          billable_input_tokens:
                            type: integer
                            example: 120
                          discount_applied:
                            type: boolean
                            example: false
                          discount_bps:
                            type: integer
                            example: 0
                  cost_halala:
                    type: integer
                  latency_ms:
                    type: integer
        '402':
          description: Insufficient balance
        '503':
          description: No providers available for this model

  /v1/complete/stream:
    post:
      tags: [vLLM]
      summary: Streaming LLM completion (SSE)
      description: |
        Submits a prompt and streams the response token-by-token as Server-Sent
        Events. Each event carries a partial `text` delta. The final event
        carries `finish_reason` and billing metadata.

        **Client usage:**
        ```javascript
        const resp = await fetch('https://api.dcp.sa/v1/complete/stream', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-renter-key': apiKey
          },
          body: JSON.stringify({ model: 'mistralai/Mistral-7B-Instruct-v0.2', prompt: 'Hello!' })
        });
        const reader = resp.body.getReader();
        // read SSE frames...
        ```
      security:
        - RenterApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, prompt]
              properties:
                model:
                  type: string
                  example: mistralai/Mistral-7B-Instruct-v0.2
                prompt:
                  type: string
                max_tokens:
                  type: integer
                  default: 512
                temperature:
                  type: number
                  default: 0.7
                stop:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: SSE token stream
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Token delta events: `data: {"text": "...", "index": 0}\n\n`
                  Final event: `data: {"finish_reason": "stop", "usage": {...}, "cost_halala": N}\n\n`
                  Terminator: `data: [DONE]\n\n`
        '402':
          description: Insufficient balance
        '503':
          description: No providers available

  /v1/chat/completions:
    post:
      tags: [vLLM]
      summary: OpenAI-compatible chat completions endpoint
      description: |
        OpenAI-compatible chat completions endpoint. Supports both streaming and
        non-streaming responses via the `stream` field in the request body.

        When `stream: true`, returns Server-Sent Events (SSE) with `chat.completion.chunk`
        objects. When `stream: false` or omitted, returns a standard
        `chat.completion` object synchronously.

        Uses the same authentication, rate limiting, and billing as `/v1/complete`.
      security:
        - RenterApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages]
              properties:
                model:
                  type: string
                  example: mistralai/Mistral-7B-Instruct-v0.2
                  description: Model ID from `/v1/models`
                messages:
                  type: array
                  description: Array of message objects with `role` and `content`
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [system, user, assistant]
                        example: user
                      content:
                        type: string
                        example: Explain quantum computing in simple terms.
                stream:
                  type: boolean
                  default: false
                  description: If true, returns SSE stream of token deltas
                max_tokens:
                  type: integer
                  default: 512
                  minimum: 1
                  maximum: 4096
                temperature:
                  type: number
                  default: 0.7
                  minimum: 0
                  maximum: 2
                top_p:
                  type: number
                  default: 1
                  minimum: 0
                  maximum: 1
                stop:
                  type: array
                  items:
                    type: string
                  description: Stop sequences
                provider_id:
                  type: integer
                  nullable: true
                  description: Pin to a specific provider. Omit to auto-select.
      responses:
        '200':
          description: Chat completion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Completion ID
                  object:
                    type: string
                    example: chat.completion
                  created:
                    type: integer
                    description: Unix timestamp
                  model:
                    type: string
                  choices:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        message:
                          type: object
                          properties:
                            role:
                              type: string
                            content:
                              type: string
                        finish_reason:
                          type: string
                          enum: [stop, length, timeout]
                  usage:
                    type: object
                    properties:
                      prompt_tokens:
                        type: integer
                      completion_tokens:
                        type: integer
                      total_tokens:
                        type: integer
                  cost_halala:
                    type: integer
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '402':
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: No providers available for this model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ──────────────────────────────────────────────────────────────────────────────
  # Provider — GPU Profile, Withdrawals, Public Marketplace (DCP-322/332)
  # ──────────────────────────────────────────────────────────────────────────────

  /api/providers/me/gpu-profile:
    patch:
      tags: [Providers]
      summary: Update provider GPU capabilities
      description: |
        Allows a provider to update their GPU profile metadata. Useful after
        hardware upgrades or configuration changes. The daemon also updates
        this automatically on each heartbeat, but this endpoint lets providers
        correct stale data manually.
      security:
        - ProviderApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gpu_model:
                  type: string
                  example: NVIDIA RTX 4090
                vram_gb:
                  type: number
                  example: 24
                gpu_count:
                  type: integer
                  example: 2
                compute_capability:
                  type: string
                  example: "8.9"
                cuda_version:
                  type: string
                  example: "12.2"
                driver_version:
                  type: string
                  example: "535.54.03"
                location:
                  type: string
                  example: SA
      responses:
        '200':
          description: GPU profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  provider_id:
                    type: integer
                  updated_fields:
                    type: array
                    items:
                      type: string
        '401':
          description: Invalid API key

  /api/providers/me/withdraw:
    post:
      tags: [Providers]
      summary: Request an earnings payout (provider self-service)
      description: |
        Alias for `POST /api/providers/withdraw`. Submits a withdrawal request
        for a portion of the provider's claimable earnings. Payout timing and
        thresholds are configured in provider payout settings.
      security:
        - ProviderApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_sar]
              properties:
                amount_sar:
                  type: number
                  example: 100.00
                payout_method:
                  type: string
                  enum: [bank_transfer, stc_pay, crypto]
                  default: bank_transfer
                payout_details:
                  type: object
                  description: IBAN, phone number, or wallet address depending on method
                  example:
                    iban: SA4420000001234567891234
                    account_name: Ahmed Al-Rashidi
      responses:
        '201':
          description: Withdrawal request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  withdrawal_id:
                    type: string
                  amount_sar:
                    type: number
                  status:
                    type: string
                    example: pending
                  message:
                    type: string
        '402':
          description: Insufficient available earnings

  /api/providers/me/withdrawals:
    get:
      tags: [Providers]
      summary: Provider withdrawal history (self-service)
      description: |
        Returns the authenticated provider's withdrawal request history.
        Alias for `GET /api/providers/withdrawal-history`.
      security:
        - ProviderApiKey: []
      parameters:
        - in: query
          name: key
          schema:
            type: string
          description: Provider API key (alternative to x-provider-key header)
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Withdrawal history
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider_id:
                    type: integer
                  withdrawals:
                    type: array
                    items:
                      type: object
                      properties:
                        withdrawal_id:
                          type: string
                        amount_sar:
                          type: number
                        payout_method:
                          type: string
                        status:
                          type: string
                          enum: [pending, approved, rejected, completed]
                        requested_at:
                          type: string
                          format: date-time
                        processed_at:
                          type: string
                          format: date-time
                          nullable: true

  /api/providers/public:
    get:
      tags: [Providers]
      summary: Public GPU marketplace — live providers
      description: |
        Returns online, unpaused GPU providers with specs and indicative pricing.
        No authentication required. Used by the public-facing marketplace page
        at `dcp.sa/marketplace`.

        Equivalent to `GET /api/providers/marketplace` — prefer this URL in new code.
      responses:
        '200':
          description: Online providers for the public marketplace
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        gpu_model:
                          type: string
                          example: NVIDIA RTX 4090
                        vram_gb:
                          type: number
                          example: 24
                        gpu_count:
                          type: integer
                          example: 1
                        location:
                          type: string
                          example: SA
                        price_per_min_halala:
                          type: integer
                          example: 15
                        uptime_pct:
                          type: number
                          example: 98.5
                        jobs_completed:
                          type: integer
                        is_live:
                          type: boolean
                          description: Heartbeat received within last 120 seconds
                        cached_models:
                          type: array
                          items:
                            type: string
                  total:
                    type: integer

  # ──────────────────────────────────────────────────────────────────────────────
  # PDPL Compliance — Data Export & Account Deletion (DCP-328)
  # ──────────────────────────────────────────────────────────────────────────────

  /api/renters/me/export:
    get:
      tags: [Renters]
      summary: Export all personal data (PDPL data portability)
      description: |
        Returns a JSON document containing all personal data held for the
        authenticated renter — profile, payment history, job history, and
        account metadata. Required under Saudi Arabia's Personal Data
        Protection Law (PDPL).

        The response is a downloadable JSON file.
      security:
        - RenterApiKey: []
      responses:
        '200':
          description: Personal data export
          content:
            application/json:
              schema:
                type: object
                properties:
                  exported_at:
                    type: string
                    format: date-time
                  renter:
                    $ref: '#/components/schemas/Renter'
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
                  payments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payment'
                  data_retention_policy:
                    type: string
                    example: Data is retained for 7 years per Saudi financial regulations.
