                    type: string
                    example: dcp.adapter_usage_attribution_readiness.v1
                  current_mode:
                    type: string
                    enum: [usage_attribution_contract_only]
                  endpoints:
                    type: object
                    additionalProperties:
                      type: string
                  policy:
                    type: object
                    additionalProperties: true
                    properties:
