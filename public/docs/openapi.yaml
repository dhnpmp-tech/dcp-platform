  /api/adapters:
    get:
      tags: [Adapters]
      summary: List renter-owned adapter artifacts
      description: |
        Returns LoRA/QLoRA adapter artifact metadata for the authenticated
        renter. This registry is metadata only: it does not deploy adapters or
        route inference traffic until a later deployment/load-proof API exists.
      security:
        - RenterApiKey: []
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [registered, validating, ready, deploying, deployed, failed, archived]
        - in: query
          name: base_model
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Adapter list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  object: { type: string, example: list }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Adapter' }
                  count: { type: integer, example: 1 }
                  limit: { type: integer, example: 50 }
                  offset: { type: integer, example: 0 }
    post:
      tags: [Adapters]
      summary: Register adapter artifact metadata
      description: |
        Registers an already-produced LoRA/QLoRA adapter artifact under the
        authenticated renter. The endpoint intentionally does not deploy the
        adapter or mark it as serving; public creation only accepts
        `registered`, `validating`, or `ready` as initial states.
      security:
        - RenterApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, base_model, storage_key, checksum_sha256]
              properties:
                adapter_id:
                  type: string
                  description: Optional client-stable id. Generated when omitted.
                  example: adpt_8f4c2b9a18e34d220f7a9b12
                name:
                  type: string
                  maxLength: 80
                  example: Arabic support adapter
                base_model:
                  type: string
                  maxLength: 160
                  example: meta-llama/Llama-3.1-8B-Instruct
                storage_key:
                  type: string
                  maxLength: 512
                  example: adapters/r42/arabic-support/adapter.safetensors
                checksum_sha256:
                  type: string
                  pattern: '^[a-fA-F0-9]{64}$'
                rank:
                  type: integer
                  minimum: 1
                  maximum: 1024
                metadata:
                  type: object
                  additionalProperties: true
                status:
                  type: string
                  enum: [registered, validating, ready]
                  default: registered
      responses:
        '201':
          description: Adapter metadata registered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  adapter: { $ref: '#/components/schemas/Adapter' }
                  deployment_enabled:
                    type: boolean
                    example: false
                  next:
                    type: string
                    example: validate_adapter_or_create_lora_training_job
        '400':
          description: Invalid adapter metadata.
        '409':
          description: Adapter id already exists.

  /api/adapters/{adapter_id}:
    get:
      tags: [Adapters]
      summary: Get one renter-owned adapter artifact
      security:
        - RenterApiKey: []
      parameters:
        - in: path
          name: adapter_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Adapter detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  adapter: { $ref: '#/components/schemas/Adapter' }
        '404':
          description: Adapter not found for this renter.

  /api/adapters/deployments:
    get:
      tags: [Adapters]
      summary: List renter adapter deployment records
      description: |
        Returns deployment lifecycle records across all adapters owned by the
        authenticated renter. These records describe deployment intent and proof
        state; they do not guarantee inference routing unless `route_traffic`
        is true.
      security:
        - RenterApiKey: []
      parameters:
        - in: query
          name: adapter_id
          required: false
          schema: { type: string }
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [pending, provisioning, running, degraded, stopped, failed]
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Adapter deployment list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  object: { type: string, example: list }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/AdapterDeployment' }
                  count: { type: integer, example: 1 }
                  limit: { type: integer, example: 50 }
                  offset: { type: integer, example: 0 }

  /api/adapters/{adapter_id}/deployments:
    get:
      tags: [Adapters]
      summary: List deployment records for one adapter
      description: |
        Returns renter-owned deployment lifecycle records for a registered
        adapter. These records describe deployment intent and proof state; they
        do not guarantee inference routing unless `route_traffic` is true.
      security:
        - RenterApiKey: []
      parameters:
        - in: path
          name: adapter_id
          required: true
          schema: { type: string }
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [pending, provisioning, running, degraded, stopped, failed]
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Adapter deployment list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  object: { type: string, example: list }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/AdapterDeployment' }
                  count: { type: integer, example: 1 }
                  limit: { type: integer, example: 50 }
                  offset: { type: integer, example: 0 }
        '404':
          description: Adapter not found for this renter.
    post:
      tags: [Adapters]
      summary: Request an adapter deployment record
      description: |
        Creates a pending deployment lifecycle record for a ready adapter. This
        endpoint is intentionally not a traffic switch: public requests cannot
        attach serving proof and always return `serving_enabled: false` until an
        internal load-proof step validates the adapter on a serving endpoint.
      security:
        - RenterApiKey: []
      parameters:
        - in: path
          name: adapter_id
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                deployment_id:
                  type: string
                  description: Optional client-stable id. Generated when omitted.
                  example: adpl_8f4c2b9a18e34d220f7a9b12
                mode:
                  type: string
                  enum: [single_adapter_live_merge, multi_lora]
                  default: single_adapter_live_merge
                base_model:
                  type: string
                  description: Must match the registered adapter base model when provided.
                  example: meta-llama/Llama-3.1-8B-Instruct
                endpoint_id:
                  type: string
                  maxLength: 120
                  example: arabic-support-prod
      responses:
        '201':
          description: Pending deployment record created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deployment: { $ref: '#/components/schemas/AdapterDeployment' }
                  serving_enabled:
                    type: boolean
                    example: false
                  next:
                    type: string
                    example: attach_serving_load_proof_internal
        '400':
          description: Invalid deployment request.
        '404':
          description: Adapter not found for this renter.
        '409':
          description: Adapter is not ready for deployment request.

  /api/adapters/{adapter_id}/deployments/{deployment_id}:
    get:
      tags: [Adapters]
      summary: Get one adapter deployment record
      security:
        - RenterApiKey: []
      parameters:
        - in: path
          name: adapter_id
          required: true
          schema: { type: string }
        - in: path
          name: deployment_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Adapter deployment detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deployment: { $ref: '#/components/schemas/AdapterDeployment' }
        '404':
          description: Deployment not found for this renter and adapter.

  /api/adapters/{adapter_id}/deployments/{deployment_id}/endpoint-smoke:
    get:
      tags: [Adapters]
      summary: Inspect disabled adapter endpoint smoke status
      description: |
        Renter-scoped read-only status contract for future deterministic
        endpoint smoke evidence. The route validates ownership and reports that
        no endpoint smoke result is recorded while smoke recording remains
        disabled. It exposes strict-load-proof readiness and the missing inputs
        needed before recording can start. It does not dispatch inference,
        record smoke results, attach load proof, route traffic, write usage
        rows, mutate balances, create invoices, settle payouts, expose raw
        prompts/responses, enable adapter billing, or claim Tinker
        compatibility.
      security:
        - RenterApiKey: []
      parameters:
        - in: path
          name: adapter_id
          required: true
          schema: { type: string }
        - in: path
          name: deployment_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Endpoint smoke status is available but no smoke evidence is recorded.
          content:
            application/json:
              schema:
                type: object
                required: [object, version, endpoint_smoke_status_endpoint_live, endpoint_smoke_recording_enabled, endpoint_smoke_recorded, latest_smoke_result, readiness, claim_guards]
                properties:
                  object:
                    type: string
                    enum: [adapter_endpoint_smoke_status_disabled]
                  version:
                    type: string
                    example: dcp.adapter_endpoint_smoke_status_disabled.v1
                  deployment_id: { type: string, example: adpl_8f4c2b9a18e34d220f7a9b12 }
                  adapter_id: { type: string, example: adpt_8f4c2b9a18e34d220f7a9b12 }
                  endpoint_id: { type: string, nullable: true, example: arabic-support-prod }
                  endpoint_smoke_status_endpoint_live: { type: boolean, example: true }
                  endpoint_smoke_recording_enabled: { type: boolean, example: false }
                  endpoint_smoke_recorded: { type: boolean, example: false }
                  latest_smoke_result:
                    nullable: true
                    example: null
                  smoke_history:
                    type: array
                    items: { type: object }
                    example: []
                  denial_code:
                    type: string
                    example: adapter_endpoint_smoke_status_unrecorded
                  readiness:
                    type: object
                    additionalProperties: false
                    properties:
                      strict_load_proof_match: { type: boolean, example: true }
                      recording_can_start: { type: boolean, example: false }
                      missing_before_recording:
                        type: array
                        items: { type: string }
                        example: [funded_smoke_principal, deterministic_smoke_submission, usage_attribution_policy, settlement_policy, minimum_balance_policy, founder_approval]
                  claim_guards:
                    type: object
                    additionalProperties: false
                    properties:
                      renter_auth_required: { type: boolean, example: true }
                      renter_owner_scope_enforced: { type: boolean, example: true }
                      disabled_status_endpoint_live: { type: boolean, example: true }
                      endpoint_smoke_recording_enabled: { type: boolean, example: false }
                      returns_recorded_smoke: { type: boolean, example: false }
                      records_smoke_result: { type: boolean, example: false }
                      routes_adapter_traffic: { type: boolean, example: false }
                      records_usage_event: { type: boolean, example: false }
                      mutates_balance: { type: boolean, example: false }
                      creates_invoice: { type: boolean, example: false }
                      settles_provider_payout: { type: boolean, example: false }
                      exposes_raw_prompt: { type: boolean, example: false }
                      exposes_raw_response: { type: boolean, example: false }
                      enables_adapter_billing: { type: boolean, example: false }
                      claims_tinker_compatibility: { type: boolean, example: false }
        '401':
          description: Renter API key required.
        '404':
          description: Deployment not found for this renter and adapter.

    post:
      tags: [Adapters]
      summary: Submit disabled adapter endpoint smoke evidence
      description: |
        Renter-scoped disabled contract for future deterministic endpoint smoke
        evidence. The route validates ownership and the future `smoke_result`
        envelope, evaluates strict load proof, funded principal, request
        attribution, response hash, latency, token totals, and adapter trace,
        then returns HTTP 409 while smoke recording remains disabled. It does
        not dispatch inference, record smoke results, attach load proof, route
        traffic, write usage rows, mutate balances, create invoices, settle
        payouts, expose raw prompts/responses, enable adapter billing, or claim
        Tinker compatibility.
      security:
        - RenterApiKey: []
      parameters:
        - in: path
          name: adapter_id
          required: true
          schema: { type: string }
        - in: path
          name: deployment_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [smoke_result]
              properties:
                funded_smoke_principal:
                  type: boolean
                  example: true
                smoke_result:
                  type: object
                  required: [renter_id, deployment_id, adapter_id, endpoint_id, base_model, artifact_checksum_sha256, provider_id, request_id, status_code, latency_ms, response_checksum_sha256, prompt_tokens, completion_tokens, total_tokens, finish_reason, adapter_trace]
                  properties:
                    renter_id: { type: integer, example: 42 }
                    deployment_id: { type: string, example: adpl_8f4c2b9a18e34d220f7a9b12 }
                    adapter_id: { type: string, example: adpt_8f4c2b9a18e34d220f7a9b12 }
                    endpoint_id: { type: string, example: arabic-support-prod }
                    base_model: { type: string, example: meta-llama/Llama-3.1-8B-Instruct }
                    artifact_checksum_sha256:
                      type: string
                      pattern: '^[a-f0-9]{64}$'
                      example: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
                    provider_id: { type: string, example: provider-12 }
                    request_id: { type: string, example: req_endpoint_smoke_001 }
                    status_code: { type: integer, minimum: 100, maximum: 599, example: 200 }
                    latency_ms: { type: integer, minimum: 0, maximum: 60000, example: 875 }
                    response_checksum_sha256:
                      type: string
                      pattern: '^[a-f0-9]{64}$'
                      example: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
                    prompt_tokens: { type: integer, minimum: 0, example: 28 }
                    completion_tokens: { type: integer, minimum: 0, example: 12 }
                    total_tokens: { type: integer, minimum: 0, example: 40 }
                    finish_reason: { type: string, example: stop }
                    adapter_trace:
                      type: object
                      additionalProperties: true
                      properties:
                        routed_through_adapter: { type: boolean, example: true }
                        deployment_id: { type: string, example: adpl_8f4c2b9a18e34d220f7a9b12 }
                        adapter_id: { type: string, example: adpt_8f4c2b9a18e34d220f7a9b12 }
                        endpoint_id: { type: string, example: arabic-support-prod }
                        artifact_checksum_sha256:
                          type: string
                          pattern: '^[a-f0-9]{64}$'
      responses:
        '409':
          description: Endpoint smoke recording is disabled; no smoke evidence was recorded.
          content:
            application/json:
              schema:
                type: object
                required: [object, version, endpoint_smoke_submission_live, endpoint_smoke_recording_enabled, recorded, denial_code, evaluation, claim_guards]
                properties:
                  object:
                    type: string
                    enum: [adapter_endpoint_smoke_submission_disabled]
                  version:
                    type: string
                    example: dcp.adapter_endpoint_smoke_submission_disabled.v1
                  endpoint_smoke_submission_live: { type: boolean, example: false }
                  endpoint_smoke_recording_enabled: { type: boolean, example: false }
                  recorded: { type: boolean, example: false }
                  would_record_if_enabled: { type: boolean, example: true }
                  denial_code:
                    type: string
                    example: adapter_endpoint_smoke_disabled
                  evaluation:
                    type: object
                    additionalProperties: true
                  claim_guards:
                    type: object
                    additionalProperties: false
                    properties:
                      renter_auth_required: { type: boolean, example: true }
                      renter_owner_scope_enforced: { type: boolean, example: true }
                      disabled_submission_endpoint_live: { type: boolean, example: true }
                      endpoint_smoke_submission_live: { type: boolean, example: false }
                      records_smoke_result: { type: boolean, example: false }
                      routes_adapter_traffic: { type: boolean, example: false }
                      records_usage_event: { type: boolean, example: false }
                      mutates_balance: { type: boolean, example: false }
                      creates_invoice: { type: boolean, example: false }
                      settles_provider_payout: { type: boolean, example: false }
                      exposes_raw_prompt: { type: boolean, example: false }
                      exposes_raw_response: { type: boolean, example: false }
                      enables_adapter_billing: { type: boolean, example: false }
                      claims_tinker_compatibility: { type: boolean, example: false }
        '400':
          description: smoke_result object is missing or malformed.
        '401':
          description: Renter API key required.
        '404':
          description: Deployment not found for this renter and adapter.

  /api/adapters/{adapter_id}/deployments/{deployment_id}/load-proof:
    post:
      tags: [Adapters]
      summary: Attach admin-verified adapter serving load proof
      description: |
        Admin/internal endpoint for attaching vLLM adapter load proof to a
        deployment record. `route_traffic` only becomes true when the proof
        shows `loaded: true` with the same deployment id, adapter id, base
        model, mode, any recorded endpoint id, and adapter artifact checksum.
        Renter deployment creation cannot call this step.
      security:
        - AdminToken: []
      parameters:
        - in: path
          name: adapter_id
          required: true
          schema: { type: string }
        - in: path
          name: deployment_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [renter_id, serving_load_proof]
              properties:
                renter_id:
                  type: integer
                  example: 42
                serving_load_proof:
                  type: object
                  required: [loaded, deployment_id, adapter_id, base_model, mode, artifact_checksum_sha256]
                  properties:
                    loaded:
                      type: boolean
                      example: true
                    deployment_id:
                      type: string
                      example: adpl_8f4c2b9a18e34d220f7a9b12
                    adapter_id:
                      type: string
                      example: adpt_8f4c2b9a18e34d220f7a9b12
                    base_model:
                      type: string
                      example: meta-llama/Llama-3.1-8B-Instruct
                    mode:
                      type: string
                      enum: [single_adapter_live_merge, multi_lora]
                      example: single_adapter_live_merge
                    endpoint_id:
                      type: string
                      description: Required to match when the deployment records an endpoint id.
                      example: arabic-support-prod
                    artifact_checksum_sha256:
                      type: string
                      pattern: '^[a-f0-9]{64}$'
                      example: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
                    loaded_at:
                      type: string
                      format: date-time
                    provider_id:
                      type: string
                      example: provider-12
                  additionalProperties: true
      responses:
        '200':
          description: Load proof stored; traffic is enabled only if proof matched.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deployment: { $ref: '#/components/schemas/AdapterDeployment' }
                  serving_enabled:
                    type: boolean
                    example: true
                  next:
                    type: string
                    example: route_traffic_allowed_by_load_proof
        '400':
          description: Missing or invalid serving_load_proof object.
        '401':
          description: Admin token required.
        '404':
          description: Deployment not found for this renter and adapter.
        '409':
          description: Deployment is stopped and cannot accept load proof.

  # ─── Providers ──────────────────────────────────────────────────────────────

  /api/providers/register:
    post:
      tags: [Providers]
      summary: Register a new GPU provider
      description: |
        Creates a new provider account and returns an API key and installer URL.
        Rate limited to 5 requests per IP per hour.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, gpu_model, os]
              properties:
                name:
                  type: string
                  example: Ahmed Al-Rashidi
                email:
                  type: string
                  format: email
                  example: ahmed@example.sa
                gpu_model:
                  type: string
                  example: NVIDIA RTX 3090
                os:
                  type: string
                  enum: [windows, linux, mac, darwin]
                  example: linux
                phone:
                  type: string
                  nullable: true
                resource_spec:
                  type: object
                  nullable: true
                  description: Ocean-style resource specification (cpu_count, ram_gb, etc.)
            example:
              name: Ahmed Al-Rashidi
              email: ahmed@example.sa
              gpu_model: NVIDIA RTX 3090
              os: linux
              phone: "+966500000000"
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  provider_id:
                    type: integer
                  api_key:
                    type: string
                    example: dc1-provider-a1b2c3d4e5f6...
                  installer_url:
                    type: string
                  message:
                    type: string
              example:
                success: true
                provider_id: 42
                api_key: dc1-provider-a1b2c3d4e5f6...
                installer_url: /api/providers/installer?key=dc1-provider-a1b2c3d4e5f6...&os=linux
                message: Welcome Ahmed Al-Rashidi! Your API key is ready. Download the installer to get started.
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Missing required fields
        '409':
          description: A provider with this email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: A provider with this email already exists
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/providers/login-email:
    post:
      tags: [Providers]
      summary: Retrieve API key by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: API key returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  api_key:
                    type: string
                  provider:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
                      gpu_model:
                        type: string
                      status:
                        type: string
        '404':
          description: No provider account found with this email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/providers/me:
    get:
      tags: [Providers]
      summary: Provider self-service dashboard
      description: Returns full provider profile, GPU metrics, earnings, and recent jobs.
      security:
        - ProviderApiKey: []
      parameters:
        - in: query
          name: key
          required: true
          schema:
            type: string
          description: Provider API key
      responses:
        '200':
          description: Provider dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider:
                    allOf:
                      - $ref: '#/components/schemas/Provider'
                      - type: object
                        properties:
                          gpu_metrics:
                            type: object
                            properties:
                              utilization_pct:
                                type: number
                              vram_used_mib:
                                type: integer
                              temperature_c:
                                type: number
                          today_earnings_halala:
                            type: integer
                          week_earnings_halala:
                            type: integer
                          active_job:
                            $ref: '#/components/schemas/Job'
                            nullable: true
                  recent_jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
              example:
                provider:
                  id: 42
                  name: Ahmed Al-Rashidi
                  status: online
                  gpu_model: NVIDIA RTX 3090
                  gpu_vram_mib: 24576
                  gpu_count_reported: 1
                  gpu_compute_capability: "8.6"
                  gpu_cuda_version: "12.2"
                  run_mode: always-on
                  uptime_percent: 99.2
                  total_earnings_halala: 185000
                  total_jobs: 92
                  is_paused: false
                  gpu_usage_cap_pct: 80
                  vram_reserve_gb: 1
                  temp_limit_c: 85
                  gpu_metrics:
                    utilization_pct: 41
                    vram_used_mib: 12112
                    temperature_c: 68
                  today_earnings_halala: 4200
                  week_earnings_halala: 26800
                  active_job: null
                recent_jobs: []
        '400':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Providers]
      summary: Delete provider account (PDPL right to erasure)
      description: |
        Permanently deletes the authenticated provider's account and personal
        data. Required under Saudi Arabia's Personal Data Protection Law (PDPL).

        **Preconditions:**
        - No jobs may be in `running` status (daemon must be stopped)
        - No pending withdrawal requests

        Earnings history is anonymised (provider ID replaced with `[deleted]`)
        rather than erased to preserve billing audit trail required by law.
        This action is **irreversible**.
      security:
        - ProviderApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm]
              properties:
                confirm:
                  type: string
                  enum: ["DELETE_MY_ACCOUNT"]
                  description: Must be the literal string `DELETE_MY_ACCOUNT`
                reason:
                  type: string
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: Provider account permanently deleted. Earnings history anonymised.
                  deleted_at:
                    type: string
                    format: date-time
        '400':
          description: Confirmation string missing or incorrect
        '409':
          description: Active jobs running or pending withdrawals exist

  /api/providers/heartbeat:
    post:
      tags: [Providers]
      summary: Provider daemon heartbeat
      description: |
        Sent every 30 seconds by the daemon. Updates GPU telemetry, sets provider
        status to `online`, recomputes reputation score, and returns job assignment
        signals and update availability.

        Rate limited to 4 per IP per minute.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key:
                  type: string
                  example: dc1-provider-a1b2c3d4e5f6...
                gpu_status:
                  type: object
                  description: GPU telemetry snapshot from nvidia-smi
                  properties:
                    gpu_name:
                      type: string
                    gpu_vram_mib:
                      type: integer
                    driver_version:
                      type: string
                    gpu_util_pct:
                      type: number
                    temp_c:
                      type: number
                    power_w:
                      type: number
                    free_vram_mib:
                      type: integer
                    daemon_version:
                      type: string
                    python_version:
                      type: string
                    os_info:
                      type: string
                    compute_capability:
                      type: string
                    cuda_version:
                      type: string
                    gpu_count:
                      type: integer
                    all_gpus:
                      type: array
                      items:
                        type: object
                uptime:
                  type: number
                  description: Daemon uptime in seconds
                provider_ip:
                  type: string
                provider_hostname:
                  type: string
                cached_models:
                  type: array
                  items:
                    type: string
                resource_spec:
                  type: object
      responses:
        '200':
          description: Heartbeat acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  update_available:
                    type: boolean
                    description: True if daemon version is below minimum required
                  needs_update:
                    type: boolean
                  latest_version:
                    type: string
                  min_version:
                    type: string
                    example: "3.3.0"
                  approval_status:
                    type: string
                  approved:
                    type: boolean
                  preload_model:
                    type: object
                    nullable: true
                    properties:
                      model_name:
                        type: string
                      status:
                        type: string
                        enum: [downloading]
              example:
                success: true
                message: Heartbeat received
                timestamp: "2026-03-22T19:30:00.000Z"
                needs_update: false
                latest_version: "3.3.0"
                update_available: false
                min_version: "3.3.0"
                approval_status: approved
                approved: true
                preload_model: null
        '400':
          description: Bad request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Provider not approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Heartbeat failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/providers/daemon-event:
    post:
      tags: [Providers]
      summary: Log daemon events (crashes, errors, job lifecycle)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key, event_type]
              properties:
                api_key:
                  type: string
                event_type:
                  type: string
                  example: crash
                severity:
                  type: string
                  enum: [info, warning, error, critical]
                  default: info
                daemon_version:
                  type: string
                timestamp:
                  type: string
                  format: date-time
                hostname:
                  type: string
                os_info:
                  type: string
                python_version:
                  type: string
                details:
                  type: string
                  maxLength: 5000
                job_id:
                  type: string
      responses:
        '200':
          description: Event logged
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  event_type:
                    type: string
                  provider_id:
                    type: integer
        '401':
          description: Invalid API key

  /api/providers/readiness:
    post:
      tags: [Providers]
      summary: Daemon reports system readiness check
      description: Called once at daemon startup. Stores CUDA/PyTorch check results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key:
                  type: string
                daemon_version:
                  type: string
                checks:
                  type: object
                  properties:
                    cuda:
                      type: boolean
                    pytorch:
                      type: boolean
                    vram_gb:
                      type: number
                    driver:
                      type: string
      responses:
        '200':
          description: Readiness recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  readiness_status:
                    type: string
                    enum: [ready, failed]
                  checks:
                    type: object

  /api/providers/pause:
    post:
      tags: [Providers]
      summary: Pause provider (stop accepting new jobs)
      security:
        - ProviderApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
      responses:
        '200':
          description: Provider paused
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  status:
                    type: string
                    example: paused

  /api/providers/resume:
    post:
      tags: [Providers]
      summary: Resume provider (accept jobs again)
      security:
        - ProviderApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
      responses:
        '200':
          description: Provider resumed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  status:
                    type: string
                    enum: [online, connected]

  /api/providers/preferences:
    post:
      tags: [Providers]
      summary: Update provider preferences
      security:
        - ProviderApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
                run_mode:
                  type: string
                  enum: [always-on, manual, scheduled]
                scheduled_start:
                  type: string
                  example: "23:00"
                  description: HH:MM — start time for scheduled mode
                scheduled_end:
                  type: string
                  example: "07:00"
                  description: HH:MM — end time for scheduled mode
                gpu_usage_cap_pct:
                  type: integer
                  minimum: 0
                  maximum: 100
                vram_reserve_gb:
                  type: number
                  minimum: 0
                  maximum: 16
                temp_limit_c:
                  type: integer
                  minimum: 50
                  maximum: 100
      responses:
        '200':
          description: Preferences updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  preferences:
                    type: object

  /api/providers/setup:
    get:
      tags: [Providers]
      summary: Download daemon.sh with injected API key (Linux/Mac)
      security:
        - ProviderApiKey: []
      parameters:
        - in: query
          name: key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Shell script with API key pre-filled
          content:
            text/x-shellscript:
              schema:
                type: string

  /api/providers/setup-windows:
    get:
      tags: [Providers]
      summary: Download daemon.ps1 with injected API key (Windows)
      security:
        - ProviderApiKey: []
      parameters:
        - in: query
          name: key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: PowerShell script with API key pre-filled
          content:
            text/plain:
              schema:
                type: string

  /api/providers/download:
    get:
      tags: [Providers]
      summary: Download installer script with injected API key
      security:
        - ProviderApiKey: []
      parameters:
        - in: query
          name: key
          required: true
          schema:
            type: string
        - in: query
          name: platform
          schema:
            type: string
            enum: [linux, mac, darwin, windows]
      responses:
        '200':
          description: Installer script
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /api/providers/download/daemon:
    get:
      tags: [Providers]
      summary: Download dcp_daemon.py
      security:
        - ProviderApiKey: []
      parameters:
        - in: query
          name: key
          required: true
          schema:
            type: string
        - in: query
          name: check_only
          schema:
            type: string
            enum: ["true", "false"]
          description: If "true", return version info only without downloading
      responses:
        '200':
          description: Daemon Python script or version info
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  min_version:
                    type: string
                  download_url:
                    type: string

  /api/providers/download-windows-exe:
    get:
      tags: [Providers]
      summary: Download generic Windows .exe installer
      responses:
        '200':
          description: Windows installer binary
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Installer not yet built

  /api/providers/installer:
    get:
      tags: [Providers]
      summary: Download platform-specific installer binary
      security:
        - ProviderApiKey: []
      parameters:
        - in: query
          name: key
          required: true
          schema:
            type: string
        - in: query
          name: os
          required: true
          schema:
            type: string
            enum: [Windows, Linux, Mac]
      responses:
        '200':
          description: Installer binary
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /api/providers/status/{api_key}:
    get:
      tags: [Providers]
      summary: Get provider status by API key (daemon-facing)
      parameters:
        - in: path
          name: api_key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Provider status
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider_id:
                    type: integer
                  name:
                    type: string
                  status:
                    type: string
                  gpu_model:
                    type: string
                  last_heartbeat:
                    type: string
                    format: date-time
                  total_earnings:
                    type: number
                  total_jobs:
                    type: integer
                  uptime_percent:
                    type: number

  /api/providers/{api_key}/jobs:
    get:
      tags: [Providers]
      summary: Daemon polls for assigned pending jobs
      description: Returns the oldest pending job assigned to this provider, or `null` if none.
      parameters:
        - in: path
          name: api_key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Next job or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  job:
                    nullable: true
                    type: object
                    properties:
                      id:
                        type: integer
                      job_id:
                        type: string
                      job_type:
                        type: string
                      task_spec:
                        type: object
                      task_spec_hmac:
                        type: string
                        description: HMAC-SHA256 of task_spec for integrity verification
                      gpu_requirements:
                        type: object
                        nullable: true
                      duration_minutes:
                        type: integer
                      max_duration_seconds:
                        type: integer

  /api/providers/job-result:
    post:
      tags: [Providers]
      summary: Daemon submits completed job result
      description: |
        Called by daemon after job completion or failure. Triggers billing settlement:
        - On success: provider earns 75%, DCP takes 25%, renter balance reconciled.
        - On failure: renter balance refunded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key, job_id]
              properties:
                api_key:
                  type: string
                job_id:
                  type: string
                success:
                  type: boolean
                result:
                  description: Job output (JSON or string)
                error:
                  type: string
                  nullable: true
                metrics:
                  type: object
                  nullable: true
      responses:
        '200':
          description: Result recorded and billing settled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  job_id:
                    type: string
                  status:
                    type: string
                    enum: [completed, failed]
                  actual_minutes:
                    type: integer
                  cost_halala:
                    type: integer
                  provider_earned_halala:
                    type: integer
                  dc1_fee_halala:
                    type: integer

  # ─── Renters ────────────────────────────────────────────────────────────────

  /api/renters/register:
    post:
      tags: [Renters]
      summary: Register a new renter account
      description: |
        Creates a renter account.
        Bonus, welcome credits, and rollout-specific limits are defined by deployment policy.
        Rate limited to 5 per IP per hour.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                  example: Fatima Al-Saud
                email:
                  type: string
                  format: email
                  example: fatima@example.sa
                organization:
                  type: string
                  nullable: true
                use_case:
                  type: string
                  nullable: true
                phone:
                  type: string
                  nullable: true
            example:
              name: Fatima Al-Saud
              email: fatima@example.sa
              organization: Riyadh AI Lab
              use_case: llm_inference
              phone: "+966500000000"
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  renter_id:
                    type: integer
                  api_key:
                    type: string
                    example: dc1-renter-a1b2c3d4e5f6...
                  message:
                    type: string
              example:
                success: true
                renter_id: 101
                api_key: dc1-renter-a1b2c3d4e5f6...
                message: Welcome Fatima Al-Saud! Save your API key — it won't be shown again.
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/renters/me:
    get:
      tags: [Renters]
      summary: Renter self-service profile and recent jobs
      security:
        - RenterApiKey: []
      parameters:
        - in: query
          name: key
          required: false
          schema:
            type: string
          description: Renter API key via query param. Use `x-renter-key` header when possible.
        - in: header
          name: x-renter-key
          required: false
          schema:
            type: string
          description: Preferred renter API key header.
      responses:
        '200':
          description: Renter profile and recent jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  renter:
                    $ref: '#/components/schemas/Renter'
                  recent_jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
              example:
                renter:
                  id: 101
                  name: Fatima Al-Saud
                  email: fatima@example.sa
                  organization: Riyadh AI Lab
                  use_case: llm_inference
                  phone: "+966500000000"
                  webhook_url: null
                  balance_halala: 955
                  total_spent_halala: 12045
                  total_jobs: 34
                  created_at: "2026-03-22T10:12:00.000Z"
                recent_jobs: []
        '400':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Renter not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to fetch renter data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Renters]
      summary: Delete renter account (PDPL right to erasure)
      description: |
        Permanently deletes the authenticated renter's account and associated
        personal data. Required under Saudi Arabia's Personal Data Protection
        Law (PDPL).

        **Preconditions:**
        - Account balance must be zero (withdraw or transfer first)
        - No jobs may be in `running` or `queued` status

        This action is **irreversible**. The API key is immediately invalidated.
      security:
        - RenterApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm]
              properties:
                confirm:
                  type: string
                  enum: ["DELETE_MY_ACCOUNT"]
                  description: Must be the literal string `DELETE_MY_ACCOUNT`
                reason:
                  type: string
                  description: Optional deletion reason (retained anonymously for regulatory reporting)
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: Account permanently deleted. All personal data erased.
                  deleted_at:
                    type: string
                    format: date-time
        '400':
          description: Confirmation string missing or incorrect
        '409':
          description: Account has active jobs or non-zero balance. Resolve before deletion.

