  /api/jobs/{job_id}/fail:
    post:
      tags: [Jobs]
      summary: Mark job as failed (daemon)
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                error:
                  type: string
      responses:
        '200':
          description: Job failed, renter refunded

  /api/jobs/{job_id}/cancel:
    post:
      tags: [Jobs]
      summary: Cancel a job
      security:
        - RenterApiKey: []
        - AdminToken: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job cancelled

  /api/jobs/history:
    get:
      tags: [Jobs]
