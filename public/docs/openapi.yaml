        traffic, usage writes, invoices, provider payouts, balance mutations,
        raw prompt/response exposure, and Tinker compatibility remain disabled.
      responses:
        '200':
          description: Adapter billing approval readiness.
          content:
            application/json:
              schema:
                type: object
                required: [object, version, current_mode, endpoints, policy, denial_codes, claim_guards]
                properties:
                  object:
                    type: string
                    enum: [adapter_billing_approval_readiness]
                  version:
                    type: string
                    example: dcp.adapter_billing_approval_readiness.v1
                  current_mode:
                    type: string
                    enum: [approval_policy_contract_only]
                  endpoints:
                    type: object
                    additionalProperties:
                      type: string
                  policy:
                    type: object
                    additionalProperties: true
                    properties:
                      readiness_available: { type: boolean, example: true }
                      founder_billing_approval_required: { type: boolean, example: true }
                      founder_billing_approval_live: { type: boolean, example: false }
                      adapter_billing_enablement_live: { type: boolean, example: false }
                      approval_mutations_enabled: { type: boolean, example: false }
                      required_evidence_before_approval:
