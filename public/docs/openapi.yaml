                      adapter_usage_attribution_enabled: { type: boolean, example: false }
                      adapter_usage_ledger_writes_enabled: { type: boolean, example: false }
                      adapter_billing_enabled: { type: boolean, example: false }
                      required_usage_fields:
                        type: array
                        items: { type: string }
                        example: [renter_id, deployment_id, adapter_id, endpoint_id, base_model, artifact_checksum_sha256, provider_id, request_id, renter_api_key_id, renter_key_type, prompt_tokens, completion_tokens, total_tokens, cost_halala, settlement_status]
                  denial_codes:
                    type: array
                    items: { type: string }
                  claim_guards:
                    type: object
                    additionalProperties: false
                    properties:
                      readiness_contract_live: { type: boolean, example: true }
                      adapter_usage_attribution_enabled: { type: boolean, example: false }
                      adapter_usage_ledger_writes_enabled: { type: boolean, example: false }
                      dispatches_inference: { type: boolean, example: false }
                      attaches_load_proof: { type: boolean, example: false }
                      routes_adapter_traffic: { type: boolean, example: false }
                      mutates_balance: { type: boolean, example: false }
                      creates_invoice: { type: boolean, example: false }
                      settles_provider_payout: { type: boolean, example: false }
                      changes_budget_cap: { type: boolean, example: false }
                      exposes_raw_prompt: { type: boolean, example: false }
                      enables_adapter_billing: { type: boolean, example: false }
                      claims_tinker_compatibility: { type: boolean, example: false }

  /api/adapters/billing/approval/readiness:
    get:
      tags: [Adapters]
      summary: Get adapter billing approval readiness
      description: |
        Returns a public, read-only policy contract for future founder approval
        before adapter billing enablement. It defines proof-packet evidence,
        local-roadmap proof, production-smoke proof, evidence hash, approval
