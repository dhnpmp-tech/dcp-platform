                    type: string
                    enum: [evaluator_job_schema_contract]
                  version:
                    type: string
                    example: dcp.evaluator_job_schema.v1
                  current_mode:
                    type: string
                    enum: [schema_contract_only]
                  endpoints:
                    type: object
                    additionalProperties:
                      type: string
                  request_schema:
                    type: object
                    additionalProperties: true
                  artifact_policy:
                    type: object
                    additionalProperties: true
                  scoring_harness:
                    type: object
                    additionalProperties: true
                  billing_policy:
                    type: object
                    additionalProperties: true
                    properties:
                      bills_eval_jobs: { type: boolean, example: false }
                      minimum_balance_endpoint: { type: string, example: GET /api/renters/me/minimum-balances }
                  claim_guards:
                    type: object
                    additionalProperties: false
                    properties:
                      create_endpoint_live: { type: boolean, example: true }
                      list_endpoint_live: { type: boolean, example: true }
                      read_endpoint_live: { type: boolean, example: true }
                      metadata_only: { type: boolean, example: true }
                      disabled_result_endpoint_live: { type: boolean, example: true }
                      result_endpoint_live: { type: boolean, example: false }
                      worker_enabled: { type: boolean, example: false }
                      stores_raw_customer_dataset: { type: boolean, example: false }
                      publishes_raw_customer_dataset: { type: boolean, example: false }
                      runs_model_comparisons: { type: boolean, example: false }
                      bills_eval_jobs: { type: boolean, example: false }
                      public_report_allowed: { type: boolean, example: false }
                      arabic_quality_claim_allowed: { type: boolean, example: false }
                      model_ranking_allowed: { type: boolean, example: false }
                      frontier_model_comparison_allowed: { type: boolean, example: false }

  /api/evals/jobs:
    get:
      tags: [Benchmarks]
      summary: List metadata-only evaluator jobs
      description: |
        Lists renter-scoped evaluator job records. These records capture eval
        intent only; workers, result artifacts, billing, reports, rankings, and
        Arabic-quality claims remain disabled.
      security:
        - RenterApiKey: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, blocked, queued, running, succeeded, failed, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Metadata-only evaluator job list.
          content:
            application/json:
              schema:
                type: object
                required: [object, data, count, worker_enabled, billing_enabled]
                properties:
                  object: { type: string, enum: [list] }
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  count: { type: integer }
                  worker_enabled: { type: boolean, example: false }
                  billing_enabled: { type: boolean, example: false }
    post:
      tags: [Benchmarks]
      summary: Create a metadata-only evaluator job record
      description: |
        Creates a renter-scoped evaluator job record in `draft` status. The
        route validates dataset SHA-256, task, metrics, candidate model, and
        optional baselines/budget metadata, then stops before any worker,
        dataset storage, billing, report, ranking, or public claim behavior.
        Use `Idempotency-Key` to safely retry.
      security:
        - RenterApiKey: []
      parameters:
        - name: Idempotency-Key
          in: header
          schema:
            type: string
            maxLength: 180
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, task, dataset, candidate_model, metrics]
              properties:
                eval_job_id:
                  type: string
                  example: evaljob_customer_001
                name: { type: string, maxLength: 120 }
                task:
                  type: string
                  enum: [arabic_qa, arabic_summarization, arabic_safety, retrieval_groundedness, tool_calling, latency_cost]
                dataset:
                  type: object
                  required: [ref, sha256, format, example_count]
                  properties:
                    ref: { type: string }
                    sha256: { type: string, minLength: 64, maxLength: 64 }
                    format: { type: string, enum: [jsonl] }
                    example_count: { type: integer, minimum: 1 }
                candidate_model: { type: string }
                baseline_models:
                  type: array
                  items: { type: string }
                metrics:
                  type: array
                  items:
                    type: string
                    enum: [exact_match, f1, semantic_similarity, arabic_safety, groundedness, p50_latency_ms, p95_latency_ms, token_cost_halala]
                max_examples: { type: integer, default: 100, maximum: 10000 }
                cost_budget_halala: { type: integer, default: 0 }
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: Evaluator job metadata record created.
          content:
            application/json:
              schema:
                type: object
                required: [eval_job, idempotent_replay, worker_enabled, billing_enabled]
                properties:
                  eval_job:
                    type: object
                    additionalProperties: true
                  idempotent_replay: { type: boolean }
                  worker_enabled: { type: boolean, example: false }
                  billing_enabled: { type: boolean, example: false }

  /api/evals/jobs/{evalJobId}:
    get:
      tags: [Benchmarks]
      summary: Read a metadata-only evaluator job record
      security:
        - RenterApiKey: []
      parameters:
        - name: evalJobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evaluator job metadata record.
          content:
            application/json:
              schema:
                type: object
                required: [eval_job, worker_enabled, billing_enabled]
                properties:
                  eval_job:
                    type: object
                    additionalProperties: true
                  worker_enabled: { type: boolean, example: false }
                  billing_enabled: { type: boolean, example: false }
        '404':
          description: Evaluator job not found for this renter.

  /api/evals/jobs/{evalJobId}/results:
    get:
      tags: [Benchmarks]
      summary: Read disabled evaluator result endpoint contract
      description: |
        Authenticated, renter-scoped disabled result route. The owning renter
        receives a 409 contract proving the result endpoint and signed downloads
        remain disabled. Other renters receive 404. The response intentionally
        does not include result manifests, artifact storage keys, signed URLs,
        billing effects, reports, rankings, or Arabic-quality claims.
      security:
        - RenterApiKey: []
      parameters:
        - name: evalJobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '409':
          description: Evaluator result endpoint is present but disabled.
          content:
            application/json:
              schema:
                type: object
                required: [object, version, eval_job_id, renter_id, denial_code, claim_guards]
                properties:
                  object:
                    type: string
                    enum: [evaluator_result_endpoint_disabled]
                  version:
                    type: string
                    example: dcp.evaluator_result_endpoint_disabled.v1
                  eval_job_id: { type: string }
                  renter_id: { type: integer }
                  job_status: { type: string }
                  result_available: { type: boolean, example: false }
                  result_endpoint_live: { type: boolean, example: false }
                  signed_downloads_enabled: { type: boolean, example: false }
                  download_url_signed: { type: boolean, example: false }
                  denial_code:
                    type: string
                    enum: [evaluator_result_endpoint_disabled]
                  endpoints:
                    type: object
                    additionalProperties:
                      type: string
                  claim_guards:
                    type: object
                    additionalProperties: false
                    properties:
                      renter_auth_required: { type: boolean, example: true }
                      renter_owner_scope_enforced: { type: boolean, example: true }
                      exposes_disabled_result_endpoint: { type: boolean, example: true }
                      exposes_live_result_endpoint: { type: boolean, example: false }
                      exposes_result_manifest: { type: boolean, example: false }
                      exposes_artifact_storage_key: { type: boolean, example: false }
                      signs_download_url: { type: boolean, example: false }
                      writes_production_artifact: { type: boolean, example: false }
                      mutates_eval_job_status: { type: boolean, example: false }
                      queues_eval_job: { type: boolean, example: false }
                      starts_worker: { type: boolean, example: false }
                      bills_eval_jobs: { type: boolean, example: false }
                      settles_eval_jobs: { type: boolean, example: false }
                      publishes_public_report: { type: boolean, example: false }
                      model_ranking_allowed: { type: boolean, example: false }
                      arabic_quality_claim_allowed: { type: boolean, example: false }
        '404':
          description: Evaluator job not found for this renter.

  /api/renters/topup:
    post:
      tags: [Renters]
      summary: Development wallet top-up endpoint (not production checkout flow)
      description: |
        Directly credits halala to renter balance. Accepts either `amount_halala`
        or `amount_sar`. This endpoint is intended for non-production flows and
