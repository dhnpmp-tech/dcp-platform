name: Secret Scan

# Blocks secrets from being committed. Scans ONLY the commits introduced by a
# PR or push (not full history), so it flags newly-introduced credentials
# without choking on already-rotated secrets that remain in deep history.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for range scanning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Determine commit range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "log_opts=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "log_opts=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "log_opts=-1" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan new commits for secrets
        run: |
          echo "Scanning commit range: ${{ steps.range.outputs.log_opts }}"
          gitleaks detect \
            --source . \
            --redact \
            --no-banner \
            --log-opts="${{ steps.range.outputs.log_opts }}" \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Upload findings (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore
