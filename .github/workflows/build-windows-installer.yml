name: Build Windows Installer (NSIS)

on:
  push:
    paths:
      - 'backend/installers/dcp-provider-Windows.nsi'
      - 'backend/installers/dcp-setup-helper.ps1'
      - 'backend/installers/dcp-uninstall-helper.ps1'
      - 'backend/installers/dcp_daemon.py'
      - 'backend/installers/dcp-icon.ico'
      - '.github/workflows/build-windows-installer.yml'
    branches: [main, refactor/dcp-daemon-rename]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Build installer
        working-directory: backend/installers
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" dcp-provider-Windows.nsi

      - name: Verify output
        working-directory: backend/installers
        run: |
          if (Test-Path "dcp-provider-setup-Windows.exe") {
            $size = (Get-Item "dcp-provider-setup-Windows.exe").Length
            Write-Host "Built successfully: dcp-provider-setup-Windows.exe ($size bytes)"
          } else {
            Write-Error "Build failed: dcp-provider-setup-Windows.exe not found"
            exit 1
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: dcp-provider-setup-Windows
          path: backend/installers/dcp-provider-setup-Windows.exe
          retention-days: 90

      - name: Create release asset (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: backend/installers/dcp-provider-setup-Windows.exe
