name: Build & Publish Instant-Tier Worker Images

on:
  push:
    branches:
      - main
    paths:
      - 'docker-templates/nemotron-nano.json'
      - 'docker-templates/sdxl.json'
      - 'docker-templates/stable-diffusion.json'
      - 'backend/docker/Dockerfile.base'
      - 'backend/docker/Dockerfile.llm-worker'
      - 'backend/docker/Dockerfile.sd-worker'
      - 'scripts/emit-instant-tier-manifest.mjs'
      - '.github/workflows/docker-instant-tier.yml'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  REGISTRY: docker.io

concurrency:
  group: docker-instant-tier-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-instant-tier:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: read
    name: Publish instant-tier worker images
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/Ruby || true
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker Hub namespace
        id: namespace
        env:
          DOCKER_HUB_NAMESPACE: ${{ secrets.DOCKER_HUB_NAMESPACE }}
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
        run: |
          namespace="${DOCKER_HUB_NAMESPACE:-${DOCKER_HUB_USERNAME:-dc1}}"
          echo "value=${namespace}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Prepare image refs
        id: refs
        run: |
          echo "immutable_tag=sha-${GITHUB_SHA}-run-${GITHUB_RUN_ID}-attempt-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "base_ref=${REGISTRY}/${{ steps.namespace.outputs.value }}/base-worker" >> "$GITHUB_OUTPUT"
          echo "llm_ref=${REGISTRY}/${{ steps.namespace.outputs.value }}/llm-worker" >> "$GITHUB_OUTPUT"
          echo "sd_ref=${REGISTRY}/${{ steps.namespace.outputs.value }}/sd-worker" >> "$GITHUB_OUTPUT"

      - name: Build and push base worker
        id: build_base
        uses: docker/build-push-action@v5
        with:
          context: ./backend/docker
          file: ./backend/docker/Dockerfile.base
          push: true
          tags: |
            ${{ steps.refs.outputs.base_ref }}:latest
            ${{ steps.refs.outputs.base_ref }}:${{ steps.refs.outputs.immutable_tag }}
          cache-from: type=gha,scope=instant-tier-base
          cache-to: type=gha,mode=max,scope=instant-tier-base

      - name: Build and push LLM worker
        id: build_llm
        uses: docker/build-push-action@v5
        with:
          context: ./backend/docker
          file: ./backend/docker/Dockerfile.llm-worker
          push: true
          tags: |
            ${{ steps.refs.outputs.llm_ref }}:latest
            ${{ steps.refs.outputs.llm_ref }}:${{ steps.refs.outputs.immutable_tag }}
          build-args: |
            BASE_IMAGE=${{ steps.refs.outputs.base_ref }}:${{ steps.refs.outputs.immutable_tag }}
            SKIP_MODEL_PREBAKE=0
            PREBAKE_MODEL=nvidia/Nemotron-Mini-4B-Instruct
          cache-from: type=gha,scope=instant-tier-llm
          cache-to: type=gha,mode=max,scope=instant-tier-llm

      - name: Build and push SD worker
        id: build_sd
        uses: docker/build-push-action@v5
        with:
          context: ./backend/docker
          file: ./backend/docker/Dockerfile.sd-worker
          push: true
          tags: |
            ${{ steps.refs.outputs.sd_ref }}:latest
            ${{ steps.refs.outputs.sd_ref }}:${{ steps.refs.outputs.immutable_tag }}
          build-args: |
            BASE_IMAGE=${{ steps.refs.outputs.base_ref }}:${{ steps.refs.outputs.immutable_tag }}
            SKIP_MODEL_PREBAKE=0
            PREBAKE_MODEL=stabilityai/stable-diffusion-xl-base-1.0
          cache-from: type=gha,scope=instant-tier-sd
          cache-to: type=gha,mode=max,scope=instant-tier-sd

      - name: Emit manifest
        run: |
          mkdir -p artifacts
          node scripts/emit-instant-tier-manifest.mjs artifacts/instant-tier-images.json
        env:
          IMAGE_REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAMESPACE: ${{ steps.namespace.outputs.value }}
          BASE_WORKER_DIGEST: ${{ steps.build_base.outputs.digest }}
          BASE_WORKER_SHA_TAG: ${{ steps.refs.outputs.immutable_tag }}
          LLM_WORKER_DIGEST: ${{ steps.build_llm.outputs.digest }}
          LLM_WORKER_SHA_TAG: ${{ steps.refs.outputs.immutable_tag }}
          SD_WORKER_DIGEST: ${{ steps.build_sd.outputs.digest }}
          SD_WORKER_SHA_TAG: ${{ steps.refs.outputs.immutable_tag }}
          LLM_TEMPLATE_IDS: nemotron-nano
          SD_TEMPLATE_IDS: sdxl,stable-diffusion

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: instant-tier-image-manifest
          path: artifacts/instant-tier-images.json

      - name: Smoke pull and bootstrap LLM worker
        run: |
          docker pull "${{ steps.refs.outputs.llm_ref }}@${{ steps.build_llm.outputs.digest }}"
          docker run --rm \
            --entrypoint python \
            "${{ steps.refs.outputs.llm_ref }}@${{ steps.build_llm.outputs.digest }}" \
            -c "import torch, vllm; print('llm-worker smoke ok')"

      - name: Smoke pull and bootstrap SD worker
        run: |
          docker pull "${{ steps.refs.outputs.sd_ref }}@${{ steps.build_sd.outputs.digest }}"
          docker run --rm \
            --entrypoint python \
            "${{ steps.refs.outputs.sd_ref }}@${{ steps.build_sd.outputs.digest }}" \
            -c "import torch, diffusers; print('sd-worker smoke ok')"

      - name: Publish summary
        run: |
          {
            echo "## Instant-tier publish"
            echo ""
            echo "| Image | Mutable tag | Immutable ref | Digest | Templates |"
            echo "|---|---|---|---|---|"
            echo "| base-worker | \`${{ steps.refs.outputs.base_ref }}:latest\` | \`${{ steps.refs.outputs.base_ref }}:${{ steps.refs.outputs.immutable_tag }}\` | \`${{ steps.build_base.outputs.digest }}\` | runtime base |"
            echo "| llm-worker | \`${{ steps.refs.outputs.llm_ref }}:latest\` | \`${{ steps.refs.outputs.llm_ref }}:${{ steps.refs.outputs.immutable_tag }}\` | \`${{ steps.build_llm.outputs.digest }}\` | nemotron-nano |"
            echo "| sd-worker | \`${{ steps.refs.outputs.sd_ref }}:latest\` | \`${{ steps.refs.outputs.sd_ref }}:${{ steps.refs.outputs.immutable_tag }}\` | \`${{ steps.build_sd.outputs.digest }}\` | sdxl, stable-diffusion |"
            echo ""
            echo "Manifest artifact: \`instant-tier-image-manifest\`"
          } >> "$GITHUB_STEP_SUMMARY"
