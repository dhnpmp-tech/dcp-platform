name: Build & Push DCP Docker Worker Images

on:
  push:
    branches: [main]
    paths:
      - 'backend/docker/**'
  workflow_dispatch:
    inputs:
      build_tier:
        description: 'Build tier: slim (no prebake) or instant (full prebake, slow)'
        required: true
        default: 'slim'
        type: choice
        options: [slim, instant]
  schedule:
    - cron: '0 2 * * *'

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_PREFIX: ghcr.io/${{ github.repository_owner }}/dcp
  DOCKERHUB_PREFIX: dcplatform/dcp

jobs:
  build-slim:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_tier == 'slim')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/Ruby || true
          docker system prune -af || true
          df -h

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push base-worker
        uses: docker/build-push-action@v5
        with:
          context: backend/docker
          file: backend/docker/Dockerfile.base
          push: true
          tags: |
            ${{ env.GHCR_PREFIX }}-base-worker:latest
            ${{ env.GHCR_PREFIX }}-base-worker:${{ github.sha }}
            ${{ env.DOCKERHUB_PREFIX }}-base-worker:latest
            ${{ env.DOCKERHUB_PREFIX }}-base-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push llm-worker (slim)
        uses: docker/build-push-action@v5
        with:
          context: backend/docker
          file: backend/docker/Dockerfile.llm-worker
          push: true
          tags: |
            ${{ env.GHCR_PREFIX }}-llm-worker:latest
            ${{ env.GHCR_PREFIX }}-llm-worker:slim
            ${{ env.GHCR_PREFIX }}-llm-worker:${{ github.sha }}
            ${{ env.DOCKERHUB_PREFIX }}-llm-worker:latest
            ${{ env.DOCKERHUB_PREFIX }}-llm-worker:slim
            ${{ env.DOCKERHUB_PREFIX }}-llm-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_IMAGE=${{ env.GHCR_PREFIX }}-base-worker:latest
            SKIP_MODEL_PREBAKE=1

      - name: Build & push sd-worker (slim)
        uses: docker/build-push-action@v5
        with:
          context: backend/docker
          file: backend/docker/Dockerfile.sd-worker
          push: true
          tags: |
            ${{ env.GHCR_PREFIX }}-sd-worker:latest
            ${{ env.GHCR_PREFIX }}-sd-worker:slim
            ${{ env.GHCR_PREFIX }}-sd-worker:${{ github.sha }}
            ${{ env.DOCKERHUB_PREFIX }}-sd-worker:latest
            ${{ env.DOCKERHUB_PREFIX }}-sd-worker:slim
            ${{ env.DOCKERHUB_PREFIX }}-sd-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_IMAGE=${{ env.GHCR_PREFIX }}-base-worker:latest
            SKIP_MODEL_PREBAKE=1

      - name: Build & push general-worker
        uses: docker/build-push-action@v5
        with:
          context: backend/docker
          file: backend/docker/Dockerfile.general-worker
          push: true
          tags: |
            ${{ env.GHCR_PREFIX }}-general-worker:latest
            ${{ env.GHCR_PREFIX }}-general-worker:${{ github.sha }}
            ${{ env.DOCKERHUB_PREFIX }}-general-worker:latest
            ${{ env.DOCKERHUB_PREFIX }}-general-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_IMAGE=${{ env.GHCR_PREFIX }}-base-worker:latest

      - name: Summary
        run: |
          echo "## Slim worker images built (GHCR + Docker Hub)" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| llm-worker | slim |" >> $GITHUB_STEP_SUMMARY
          echo "| sd-worker | slim |" >> $GITHUB_STEP_SUMMARY
          echo "| general-worker | latest |" >> $GITHUB_STEP_SUMMARY

  build-instant:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.build_tier == 'instant')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/Ruby || true
          docker system prune -af || true
          df -h

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull base-worker (from slim build)
        run: docker pull ${{ env.GHCR_PREFIX }}-base-worker:latest

      - name: Build & push llm-worker (instant — Nemotron-Mini-4B pre-baked)
        uses: docker/build-push-action@v5
        with:
          context: backend/docker
          file: backend/docker/Dockerfile.llm-worker
          push: true
          tags: |
            ${{ env.GHCR_PREFIX }}-llm-worker:instant
            ${{ env.DOCKERHUB_PREFIX }}-llm-worker:instant
          build-args: |
            BASE_IMAGE=${{ env.GHCR_PREFIX }}-base-worker:latest
            SKIP_MODEL_PREBAKE=0
            PREBAKE_MODEL=nvidia/Nemotron-Mini-4B-Instruct
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Build & push sd-worker (instant — SDXL pre-baked)
        uses: docker/build-push-action@v5
        with:
          context: backend/docker
          file: backend/docker/Dockerfile.sd-worker
          push: true
          tags: |
            ${{ env.GHCR_PREFIX }}-sd-worker:instant
            ${{ env.DOCKERHUB_PREFIX }}-sd-worker:instant
          build-args: |
            BASE_IMAGE=${{ env.GHCR_PREFIX }}-base-worker:latest
            SKIP_MODEL_PREBAKE=0
            PREBAKE_MODEL=stabilityai/stable-diffusion-xl-base-1.0
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Summary
        run: |
          echo "## Instant-tier images built (GHCR + Docker Hub)" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag | Model |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| llm-worker | instant | Nemotron-Mini-4B (~8 GB) |" >> $GITHUB_STEP_SUMMARY
          echo "| sd-worker | instant | SDXL-base-1.0 (~6.5 GB) |" >> $GITHUB_STEP_SUMMARY
