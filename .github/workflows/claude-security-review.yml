name: Claude security review

# Anthropic's OWASP-aligned security review.
# Runs on every PR; posts inline comments where it finds vulns.
#
# Required repo secret: CLAUDE_API_KEY (same value as ANTHROPIC_API_KEY,
# this action reads a different env name).
# Source: https://github.com/anthropics/claude-code-security-review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
      - uses: anthropics/claude-code-security-review@main
        with:
          comment-pr: true
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
