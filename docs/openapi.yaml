  /api/admin/payments/revenue:
    get:
      tags: [Admin]
      summary: Payment revenue summary
      security:
        - AdminToken: []
      responses:
        '200':
          description: Revenue from Moyasar payments

  /api/admin/payments/audit:
    get:
      tags: [Admin]
      summary: Combined payments audit feed
      description: |
        Returns the admin payments work queue in one request: payout requests,
        billing settlement attempts, auto-top-up attempts, and renter-created
        refund requests.
      security:
        - AdminToken: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximum rows returned per section.
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, processing, paid, rejected]
          description: Optional payout status filter.
      responses:
        '200':
          description: Combined audit queues
          content:
            application/json:
              schema:
                type: object
                properties:
                  payouts:
                    type: array
                    items:
                      type: object
                  billing:
                    type: array
                    items:
                      type: object
                  auto_topup:
                    type: array
                    items:
                      type: object
                  refund_requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentRefundRequest'
                  summary:
                    type: object
                    properties:
                      payouts:
                        type: object
                        additionalProperties:
                          type: integer
                      billing_attempts:
                        type: object
                        additionalProperties:
                          type: integer
                      auto_topup:
                        type: object
                        additionalProperties:
                          type: integer
                      refund_requests:
                        type: object
                        additionalProperties:
                          type: integer
        '401':
          description: Admin token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/payments/{paymentId}/refund:
    post:
      tags: [Admin]
      summary: Initiate a refund via Moyasar
      security:
        - AdminToken: []
      parameters:
        - in: path
          name: paymentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount_halala:
                  type: integer
                  description: Partial refund amount (omit for full refund)
                reason:
                  type: string
      responses:
        '200':
          description: Refund initiated

  /api/admin/payments/refund-requests/{id}/approve:
    post:
      tags: [Admin]
      summary: Approve a renter refund request
      description: |
        Marks a pending refund request as processing, refunds the paid payment
        internally or through Moyasar when configured, debits the renter balance,
        and records an admin audit event.
      security:
        - AdminToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                admin_note:
                  type: string
                  maxLength: 1000
      responses:
        '200':
          description: Refund request approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  request_id:
                    type: string
                  payment_id:
                    type: string
                  refunded_halala:
                    type: integer
                  refunded_sar:
                    type: number
                  channel:
                    type: string
                    enum: [manual, moyasar]
        '404':
          description: Refund request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Refund request or payment is no longer approvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Moyasar refund failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/payments/refund-requests/{id}/reject:
    post:
      tags: [Admin]
      summary: Reject a renter refund request
      security:
        - AdminToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 3
                  maxLength: 1000
      responses:
        '200':
          description: Refund request rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  request_id:
                    type: string
                  status:
                    type: string
                    enum: [rejected]
        '400':
          description: Rejection reason is missing or too short
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
