        '200':
          description: Balance adjusted

  /api/admin/renters/{id}/rotate-key:
    post:
      tags: [Admin]
      summary: Rotate a renter API key (admin override)
      security:
        - AdminToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
