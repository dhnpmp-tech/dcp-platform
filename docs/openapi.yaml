          required: true
          schema:
            type: string
        - in: query
          name: os
          required: true
          schema:
            type: string
            enum: [Windows, Linux, Mac]
      responses:
        '200':
          description: Installer binary
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /api/providers/status/{api_key}:
    get:
      tags: [Providers]
      summary: Get provider status by API key (daemon-facing)
      parameters:
        - in: path
          name: api_key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Provider status
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider_id:
                    type: integer
                  name:
                    type: string
                  status:
                    type: string
                  gpu_model:
                    type: string
                  last_heartbeat:
                    type: string
                    format: date-time
