  # ─── System ─────────────────────────────────────────────────────────────────

  /api/health:
    get:
      tags: [System]
      summary: API health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: dcp-platform-api
                  mode:
                    type: string
                    example: headless
                  timestamp:
                    type: string
                    format: date-time

  # ──────────────────────────────────────────────────────────────────────────────
  # Templates
  # ──────────────────────────────────────────────────────────────────────────────

  /api/templates:
    get:
      tags: [Templates]
      summary: List compute templates
      description: |
        Returns all available Docker compute templates, sorted by `sort_order`.
        Optionally filter by tag (e.g. `llm`, `image-gen`, `training`).
        The `approved_images` field is omitted from list responses for security —
        use `/api/templates/whitelist` for the daemon image whitelist.
      parameters:
        - name: tag
          in: query
          required: false
          schema:
            type: string
            example: llm
          description: Filter templates by tag
      responses:
        '200':
          description: Template list
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      $ref: '#/components/schemas/Template'
                  count:
                    type: integer
                    example: 4

  /api/templates/whitelist:
    get:
      tags: [Templates]
      summary: Approved Docker image whitelist
      description: |
        Returns the full list of approved Docker images that the dcp_daemon.py
        will accept for job execution. Used by the daemon on startup and on each
        job pull to validate the image field before launching a container.
        No authentication required — this is a public endpoint.
      responses:
        '200':
          description: Approved image list
          content:
            application/json:
              schema:
                type: object
                properties:
                  approved_images:
                    type: array
                    items:
                      type: string
                    example:
                      - dc1/llm-worker:latest
                      - dc1/sd-worker:latest
                      - pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime

  /api/templates/{template_id}:
    get:
      tags: [Templates]
      summary: Get a single compute template
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: string
            example: llm-inference-v1
      responses:
        '200':
          description: Template detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ──────────────────────────────────────────────────────────────────────────────
  # Provider — Withdrawals
  # ──────────────────────────────────────────────────────────────────────────────

  /api/providers/withdraw:
    post:
      tags: [Providers]
      summary: Request an earnings withdrawal
      description: |
        Provider submits a withdrawal request for a portion of their claimable
        earnings. Payout method, timing, and minimum threshold are
        configured in platform payout settings.

        The request is created with status `pending` and appears in the admin
        withdrawal queue at `/api/admin/withdrawals`.
      security:
        - ProviderApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key, amount_sar]
              properties:
                api_key:
                  type: string
                  description: Provider API key
                  example: dc1-provider-abcdef1234567890
                amount_sar:
                  type: number
                  format: float
                  description: Amount to withdraw in SAR (platform-configured minimum)
                  example: 250.00
                payout_method:
                  type: string
                  enum: [bank_transfer, stc_pay, crypto]
                  default: bank_transfer
                  example: bank_transfer
                payout_details:
                  type: object
                  description: Method-specific payout details (IBAN, phone, wallet address)
                  example:
                    iban: SA4420000001234567891234
                    account_name: Ahmed Al-Rashidi
      responses:
        '201':
          description: Withdrawal request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  withdrawal_id:
                    type: string
                    example: wd-1710843600000-ab3f
                  amount_sar:
                    type: number
                    example: 250.00
                  status:
                    type: string
                    example: pending
                  message:
                    type: string
                    example: Withdrawal request submitted.
        '400':
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '402':
          description: Insufficient available earnings
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Insufficient available earnings
                  available_sar:
                    type: string
                    example: "120.50"
                  available_halala:
                    type: integer
                    example: 12050
                  requested_sar:
                    type: number
                    example: 250.00

  /api/providers/withdrawal-history:
    get:
      tags: [Providers]
      summary: Provider withdrawal history
      description: |
        Returns the provider's last 50 withdrawal requests with status and timestamps.
      security:
        - ProviderApiKey: []
      parameters:
        - name: key
          in: query
          schema:
            type: string
          description: Provider API key (alternative to x-provider-key header)
      responses:
        '200':
          description: Withdrawal history
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider_id:
                    type: integer
                    example: 7
                  withdrawals:
                    type: array
                    items:
                      type: object
                      properties:
                        withdrawal_id:
                          type: string
                          example: wd-1710843600000-ab3f
                        amount_sar:
                          type: number
                          example: 250.00
                        payout_method:
                          type: string
                          example: bank_transfer
                        status:
                          type: string
                          enum: [pending, approved, rejected, completed]
                          example: completed
                        requested_at:
                          type: string
                          format: date-time
                        processed_at:
                          type: string
                          format: date-time
                          nullable: true
        '400':
          description: API key required
        '401':
          description: Invalid API key

