openapi: 3.1.0
info:
  title: DCP Platform API
  version: 5.0.0
  description: |
    DCP is a Saudi-hosted GPU compute marketplace for AI workloads.
    Providers register NVIDIA GPUs, install the Python daemon, and earn SAR.
    Renters submit compute jobs (LLM inference, image generation, training) that
    run on provider hardware. DCP takes 25% fee; providers earn 75%.

    ## Currency
    All monetary amounts are in **halala** (1 SAR = 100 halala) unless the field
    name ends in `_sar`.

    ## Auth
    Three auth schemes are used depending on the caller role:

    | Role | Scheme | How |
    |------|--------|-----|
    | Provider | `ProviderApiKey` | `?key=` query param or `x-provider-key` header |
    | Renter | `RenterApiKey` | `?key=` query param or `x-renter-key` header |
    | Admin | `AdminToken` | `x-admin-token` header |

    ## Rate Limits
    | Endpoint | Limit |
    |----------|-------|
    | `POST /providers/register` | 5 / IP / hour |
    | `POST /providers/heartbeat` | 4 / IP / minute |
    | `POST /renters/register` | 5 / IP / hour |
    | `POST /jobs/submit` | 10 / renter API key / minute |
    | `POST /payments/topup` | 10 / IP / minute |
    | `GET /api/providers/marketplace` | 30 / IP / minute |
    | `GET /api/admin/*` | 100 / IP / minute |
    | All other `/api/*` | 300 / IP / minute |

  contact:
    name: DCP DevRel
    url: https://dcp.sa/docs
  x-env-vars:
    DC1_ADMIN_TOKEN:
      description: Secret token for admin endpoint auth. Set in PM2 env.
      required: true
    DC1_HMAC_SECRET:
      description: HMAC-SHA256 secret for signing task_spec payloads. Must persist across restarts.
      required: true
    MOYASAR_SECRET_KEY:
      description: Moyasar payment gateway API key (Basic auth). Enables real SAR payments.
      required: false
    MOYASAR_WEBHOOK_SECRET:
      description: HMAC secret for verifying Moyasar webhook signatures. Defaults to MOYASAR_SECRET_KEY.
      required: false
    RESEND_API_KEY:
      description: Resend.com API key for transactional email delivery.
      required: false
    FRONTEND_URL:
      description: Frontend base URL injected into payment callback links. Defaults to https://dcp.sa.
      required: false
    BACKEND_URL:
      description: Backend URL injected into installer scripts. Defaults to https://api.dcp.sa.
      required: false
    CORS_ORIGINS:
      description: Comma-separated extra origins to allow in addition to the hardcoded allowlist.
      required: false

servers:
  - url: https://api.dcp.sa
    description: Production API
  - url: http://localhost:8083
    description: Local development

tags:
  - name: Providers
    description: GPU provider registration, daemon management, and earnings
  - name: Renters
    description: Renter registration, balance, and account management
  - name: Jobs
    description: Job submission, polling, result reporting, and status tracking
  - name: Payments
    description: Moyasar SAR payment initiation, webhook handling, and history
  - name: Admin
    description: Platform administration — providers, renters, jobs, finance, security
  - name: Templates
    description: Docker compute templates — available job types and approved image whitelist
  - name: Containers
    description: Container registry — approved images, custom image requests, security scans
  - name: vLLM
    description: Managed vLLM inference — synchronous and streaming completions
  - name: System
    description: Health checks and API info

components:
  securitySchemes:
    ProviderApiKey:
      type: apiKey
      in: query
      name: key
      description: Provider API key. Prefix `dc1-provider-`. Also accepted as `x-provider-key` header.
    RenterApiKey:
      type: apiKey
      in: query
      name: key
      description: Renter API key. Prefix `dc1-renter-`. Also accepted as `x-renter-key` header.
    AdminToken:
      type: apiKey
      in: header
      name: x-admin-token
      description: Admin token set via DC1_ADMIN_TOKEN env var. Also accepted as Bearer token.

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: Missing required fields

    Template:
      type: object
      description: A Docker compute template defining how a job type is executed
      properties:
        id:
          type: string
          example: llm-inference-v1
        name:
          type: string
          example: LLM Inference (vLLM)
        description:
          type: string
          example: Run LLM inference jobs using vLLM with OpenAI-compatible API
        image:
          type: string
          example: dc1/llm-worker:latest
        tags:
          type: array
          items:
            type: string
          example: [llm, inference]
        sort_order:
          type: integer
          example: 1
        params_schema:
          type: object
          description: JSON Schema for the job params field
        resource_requirements:
          type: object
          properties:
            min_vram_gb:
              type: integer
              example: 16
            gpu_required:
              type: boolean
              example: true

    Provider:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        gpu_model:
          type: string
          example: RTX 3090
        status:
          type: string
          enum: [registered, connected, online, offline, paused, suspended]
        last_heartbeat:
          type: string
          format: date-time
          nullable: true
        daemon_version:
          type: string
          nullable: true
        run_mode:
          type: string
          enum: [always-on, manual, scheduled]
        uptime_percent:
          type: number
        total_earnings_halala:
          type: integer
        total_jobs:
          type: integer
        gpu_vram_mib:
          type: integer
          nullable: true
        gpu_count_reported:
          type: integer
        gpu_compute_capability:
          type: string
          nullable: true
        gpu_cuda_version:
          type: string
          nullable: true
        is_paused:
          type: boolean
        gpu_usage_cap_pct:
          type: integer
          description: Max GPU utilization cap (0–100)
        vram_reserve_gb:
          type: number
          description: VRAM reserved for OS/other apps (0–16 GB)
        temp_limit_c:
          type: integer
          description: Max GPU temperature limit (50–100°C)

    Renter:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        organization:
          type: string
          nullable: true
        balance_halala:
          type: integer
        total_spent_halala:
          type: integer
        total_jobs:
          type: integer
        created_at:
          type: string
          format: date-time

    Job:
      type: object
      properties:
        id:
          type: integer
        job_id:
          type: string
          description: UUID job identifier
        job_type:
          type: string
          enum: [llm-inference, llm_inference, training, rendering, image_generation, vllm_serve, custom]
        status:
          type: string
          enum: [queued, pending, running, completed, failed, cancelled]
        submitted_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        cost_halala:
          type: integer
          description: Estimated/reserved cost at submit time
        actual_cost_halala:
          type: integer
          nullable: true
          description: Actual cost settled at completion
        provider_earned_halala:
          type: integer
          nullable: true
        dc1_fee_halala:
          type: integer
          nullable: true

    Payment:
      type: object
      properties:
        payment_id:
          type: string
        amount_sar:
          type: number
        amount_halala:
          type: integer
        status:
          type: string
          enum: [initiated, paid, failed, refunded]
        source_type:
          type: string
          enum: [creditcard, mada, applepay, sandbox]
        description:
          type: string
        created_at:
          type: string
          format: date-time
        confirmed_at:
          type: string
          format: date-time
          nullable: true

    PaymentRefundRequest:
      type: object
      properties:
        request_id:
          type: string
          example: rfr_6f2a2f3a8b4c9d0e1f2a3b4c
        payment_id:
          type: string
          example: pay_bt_6f2a2f3a8b4c9d0e1f2a3b4c
        moyasar_id:
          type: string
          nullable: true
        renter_id:
          type: integer
        renter_name:
          type: string
          nullable: true
        renter_email:
          type: string
          format: email
          nullable: true
        amount_halala:
          type: integer
        amount_sar:
          type: number
        reason:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, processing, approved, rejected]
        requested_at:
          type: string
          format: date-time
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        reviewed_by:
          type: string
          nullable: true
        admin_note:
          type: string
          nullable: true
        moyasar_refund_id:
          type: string
          nullable: true
        payment_amount_sar:
          type: number
          nullable: true
        payment_status:
          type: string
          nullable: true
        payment_created_at:
          type: string
          format: date-time
          nullable: true

paths:

  # ─── Providers ──────────────────────────────────────────────────────────────

  /api/providers/register:
    post:
      tags: [Providers]
      summary: Register a new GPU provider
      description: |
        Creates a new provider account and returns an API key and installer URL.
        Rate limited to 5 requests per IP per hour.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, gpu_model, os]
              properties:
                name:
                  type: string
                  example: Ahmed Al-Rashidi
                email:
                  type: string
                  format: email
                  example: ahmed@example.sa
                gpu_model:
                  type: string
                  example: NVIDIA RTX 3090
                os:
                  type: string
                  enum: [windows, linux, mac, darwin]
                  example: linux
                phone:
                  type: string
                  nullable: true
                resource_spec:
                  type: object
                  nullable: true
                  description: Ocean-style resource specification (cpu_count, ram_gb, etc.)
            example:
              name: Ahmed Al-Rashidi
              email: ahmed@example.sa
              gpu_model: NVIDIA RTX 3090
              os: linux
              phone: "+966500000000"
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  provider_id:
                    type: integer
                  api_key:
                    type: string
                    example: dc1-provider-a1b2c3d4e5f6...
                  installer_url:
                    type: string
                  message:
                    type: string
              example:
                success: true
                provider_id: 42
                api_key: dc1-provider-a1b2c3d4e5f6...
                installer_url: /api/providers/installer?key=dc1-provider-a1b2c3d4e5f6...&os=linux
                message: Welcome Ahmed Al-Rashidi! Your API key is ready. Download the installer to get started.
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Missing required fields
        '409':
          description: A provider with this email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: A provider with this email already exists
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/providers/login-email:
    post:
      tags: [Providers]
      summary: Retrieve API key by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: API key returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  api_key:
                    type: string
                  provider:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
                      gpu_model:
                        type: string
                      status:
                        type: string
        '404':
          description: No provider account found with this email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/providers/me:
    get:
      tags: [Providers]
      summary: Provider self-service dashboard
      description: Returns full provider profile, GPU metrics, earnings, and recent jobs.
      security:
        - ProviderApiKey: []
      parameters:
        - in: query
          name: key
          required: true
          schema:
            type: string
          description: Provider API key
      responses:
        '200':
          description: Provider dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider:
                    allOf:
                      - $ref: '#/components/schemas/Provider'
                      - type: object
                        properties:
                          gpu_metrics:
                            type: object
                            properties:
                              utilization_pct:
                                type: number
                              vram_used_mib:
                                type: integer
                              temperature_c:
                                type: number
                          today_earnings_halala:
                            type: integer
                          week_earnings_halala:
                            type: integer
                          active_job:
                            $ref: '#/components/schemas/Job'
                            nullable: true
                  recent_jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
              example:
                provider:
                  id: 42
                  name: Ahmed Al-Rashidi
                  status: online
                  gpu_model: NVIDIA RTX 3090
                  gpu_vram_mib: 24576
                  gpu_count_reported: 1
                  gpu_compute_capability: "8.6"
                  gpu_cuda_version: "12.2"
                  run_mode: always-on
                  uptime_percent: 99.2
                  total_earnings_halala: 185000
                  total_jobs: 92
                  is_paused: false
                  gpu_usage_cap_pct: 80
                  vram_reserve_gb: 1
                  temp_limit_c: 85
                  gpu_metrics:
                    utilization_pct: 41
                    vram_used_mib: 12112
                    temperature_c: 68
                  today_earnings_halala: 4200
                  week_earnings_halala: 26800
                  active_job: null
                recent_jobs: []
        '400':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Providers]
      summary: Delete provider account (PDPL right to erasure)
      description: |
        Permanently deletes the authenticated provider's account and personal
        data. Required under Saudi Arabia's Personal Data Protection Law (PDPL).

        **Preconditions:**
        - No jobs may be in `running` status (daemon must be stopped)
        - No pending withdrawal requests

        Earnings history is anonymised (provider ID replaced with `[deleted]`)
        rather than erased to preserve billing audit trail required by law.
        This action is **irreversible**.
      security:
        - ProviderApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm]
              properties:
                confirm:
                  type: string
                  enum: ["DELETE_MY_ACCOUNT"]
                  description: Must be the literal string `DELETE_MY_ACCOUNT`
                reason:
                  type: string
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: Provider account permanently deleted. Earnings history anonymised.
                  deleted_at:
                    type: string
                    format: date-time
        '400':
          description: Confirmation string missing or incorrect
        '409':
          description: Active jobs running or pending withdrawals exist

  /api/providers/heartbeat:
    post:
      tags: [Providers]
      summary: Provider daemon heartbeat
      description: |
        Sent every 30 seconds by the daemon. Updates GPU telemetry, sets provider
        status to `online`, recomputes reputation score, and returns job assignment
        signals and update availability.

        Rate limited to 4 per IP per minute.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key:
                  type: string
                  example: dc1-provider-a1b2c3d4e5f6...
                gpu_status:
                  type: object
                  description: GPU telemetry snapshot from nvidia-smi
                  properties:
                    gpu_name:
                      type: string
                    gpu_vram_mib:
                      type: integer
                    driver_version:
                      type: string
                    gpu_util_pct:
                      type: number
                    temp_c:
                      type: number
                    power_w:
                      type: number
                    free_vram_mib:
                      type: integer
                    daemon_version:
                      type: string
                    python_version:
                      type: string
                    os_info:
                      type: string
                    compute_capability:
                      type: string
                    cuda_version:
                      type: string
                    gpu_count:
                      type: integer
                    all_gpus:
                      type: array
                      items:
                        type: object
                uptime:
                  type: number
                  description: Daemon uptime in seconds
                provider_ip:
                  type: string
                provider_hostname:
                  type: string
                cached_models:
                  type: array
                  items:
                    type: string
                resource_spec:
                  type: object
      responses:
        '200':
          description: Heartbeat acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  update_available:
                    type: boolean
                    description: True if daemon version is below minimum required
                  needs_update:
                    type: boolean
                  latest_version:
                    type: string
                  min_version:
                    type: string
                    example: "3.3.0"
                  approval_status:
                    type: string
                  approved:
                    type: boolean
                  preload_model:
                    type: object
                    nullable: true
                    properties:
                      model_name:
                        type: string
                      status:
                        type: string
                        enum: [downloading]
              example:
                success: true
                message: Heartbeat received
                timestamp: "2026-03-22T19:30:00.000Z"
                needs_update: false
                latest_version: "3.3.0"
                update_available: false
                min_version: "3.3.0"
                approval_status: approved
                approved: true
                preload_model: null
        '400':
          description: Bad request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Provider not approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Heartbeat failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/providers/daemon-event:
    post:
      tags: [Providers]
      summary: Log daemon events (crashes, errors, job lifecycle)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key, event_type]
              properties:
                api_key:
                  type: string
                event_type:
                  type: string
                  example: crash
                severity:
                  type: string
                  enum: [info, warning, error, critical]
                  default: info
                daemon_version:
                  type: string
                timestamp:
                  type: string
                  format: date-time
                hostname:
                  type: string
                os_info:
                  type: string
                python_version:
                  type: string
                details:
                  type: string
                  maxLength: 5000
                job_id:
                  type: string
      responses:
        '200':
          description: Event logged
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  event_type:
                    type: string
                  provider_id:
                    type: integer
        '401':
          description: Invalid API key

  /api/providers/readiness:
    post:
      tags: [Providers]
      summary: Daemon reports system readiness check
      description: Called once at daemon startup. Stores CUDA/PyTorch check results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key:
                  type: string
                daemon_version:
                  type: string
                checks:
                  type: object
                  properties:
                    cuda:
                      type: boolean
                    pytorch:
                      type: boolean
                    vram_gb:
                      type: number
                    driver:
                      type: string
      responses:
        '200':
          description: Readiness recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  readiness_status:
                    type: string
                    enum: [ready, failed]
                  checks:
                    type: object

  /api/providers/pause:
    post:
      tags: [Providers]
      summary: Pause provider (stop accepting new jobs)
      security:
        - ProviderApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
      responses:
        '200':
          description: Provider paused
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  status:
                    type: string
                    example: paused

  /api/providers/resume:
    post:
      tags: [Providers]
      summary: Resume provider (accept jobs again)
      security:
        - ProviderApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
      responses:
        '200':
          description: Provider resumed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  status:
                    type: string
                    enum: [online, connected]

  /api/providers/preferences:
    post:
      tags: [Providers]
      summary: Update provider preferences
      security:
        - ProviderApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
                run_mode:
                  type: string
                  enum: [always-on, manual, scheduled]
                scheduled_start:
                  type: string
                  example: "23:00"
                  description: HH:MM — start time for scheduled mode
                scheduled_end:
                  type: string
                  example: "07:00"
                  description: HH:MM — end time for scheduled mode
                gpu_usage_cap_pct:
                  type: integer
                  minimum: 0
                  maximum: 100
                vram_reserve_gb:
                  type: number
                  minimum: 0
                  maximum: 16
                temp_limit_c:
                  type: integer
                  minimum: 50
                  maximum: 100
      responses:
        '200':
          description: Preferences updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  preferences:
                    type: object

  /api/providers/setup:
    get:
      tags: [Providers]
      summary: Download daemon.sh with injected API key (Linux/Mac)
      security:
        - ProviderApiKey: []
      parameters:
        - in: query
          name: key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Shell script with API key pre-filled
          content:
            text/x-shellscript:
              schema:
                type: string

  /api/providers/setup-windows:
    get:
      tags: [Providers]
      summary: Download daemon.ps1 with injected API key (Windows)
      security:
        - ProviderApiKey: []
      parameters:
        - in: query
          name: key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: PowerShell script with API key pre-filled
          content:
            text/plain:
              schema:
                type: string

  /api/providers/download:
    get:
      tags: [Providers]
      summary: Download installer script with injected API key
      security:
        - ProviderApiKey: []
      parameters:
        - in: query
          name: key
          required: true
          schema:
            type: string
        - in: query
          name: platform
          schema:
            type: string
            enum: [linux, mac, darwin, windows]
      responses:
        '200':
          description: Installer script
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /api/providers/download/daemon:
    get:
      tags: [Providers]
      summary: Download dcp_daemon.py
      security:
        - ProviderApiKey: []
      parameters:
