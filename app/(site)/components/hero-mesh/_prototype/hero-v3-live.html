<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>DCP — Live Hero v3 (interactive mesh)</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  html,body{height:100%;background:#050a14;color:#f5f3ee;font-family:Inter,system-ui,sans-serif;overflow:hidden}
  .hero{position:relative;width:100vw;height:100vh;isolation:isolate}
  #gl{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:0}
  #mesh{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
  .scrim{position:absolute;inset:0;z-index:2;pointer-events:none;
    background:linear-gradient(90deg, rgba(5,10,20,.9) 0%, rgba(5,10,20,.5) 38%, rgba(5,10,20,0) 70%)}
  .content{position:relative;z-index:3;height:100%;display:flex;flex-direction:column;justify-content:center;
    padding:0 clamp(24px,7vw,120px);max-width:1040px;pointer-events:none}
  .eyebrow{font:600 .76rem/1 'JetBrains Mono',monospace;letter-spacing:.24em;text-transform:uppercase;
    color:#9fb0c9;margin-bottom:24px;display:flex;align-items:center;gap:10px}
  .eyebrow .d{width:7px;height:7px;border-radius:50%;background:#2dd4b6;box-shadow:0 0 10px #2dd4b6;animation:bp 1.8s ease-in-out infinite}
  h1{font-weight:800;letter-spacing:-.025em;font-size:clamp(2.6rem,1.4rem+6vw,6rem);line-height:.98}
  h1 .serif{font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-style:italic;letter-spacing:0;
    background:linear-gradient(100deg,#2dd4b6 10%,#7fe9d6 45%,#EE7A3C 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  p.sub{margin-top:24px;font-size:clamp(1.05rem,.9rem+.7vw,1.35rem);color:#c9c5bd;max-width:580px;line-height:1.5}
  .cta{margin-top:36px;pointer-events:auto;display:inline-flex;gap:8px;align-items:center;width:max-content;
    background:linear-gradient(100deg,#2dd4b6,#36c9b0);color:#050a14;font-weight:700;text-decoration:none;
    padding:15px 28px;border-radius:12px;transition:transform .2s,box-shadow .2s}
  .cta:hover{transform:translateY(-2px);box-shadow:0 16px 44px rgba(45,212,182,.32)}
  .meta{position:absolute;left:clamp(24px,7vw,120px);bottom:30px;z-index:3;
    font:500 .78rem/1.5 'JetBrains Mono',monospace;color:#7b8da5;letter-spacing:.02em}
  .meta b{color:#2dd4b6;font-weight:600}
  .meta .d{display:inline-block;width:7px;height:7px;border-radius:50%;background:#2dd4b6;margin-right:8px;
    box-shadow:0 0 9px #2dd4b6;animation:bp 1.8s ease-in-out infinite;vertical-align:middle}
  @keyframes bp{0%,100%{opacity:1}50%{opacity:.25}}
</style>
</head>
<body>
<section class="hero">
  <canvas id="gl"></canvas>
  <canvas id="mesh"></canvas>
  <div class="scrim"></div>
  <div class="content">
    <div class="eyebrow"><span class="d"></span>Sovereign GPU compute · in-Kingdom</div>
    <h1>Rent a whole GPU,<br><span class="serif">by the second.</span></h1>
    <p class="sub">Saudi Arabia's GPU mesh — billed in Riyal, live in seconds. And this page? It's being rendered, right now, on the device in your hands.</p>
    <a class="cta" href="#">Start free →</a>
  </div>
  <div class="meta"><span class="d"></span>Rendered live on your <b id="dev">device</b> · <span id="fps">– fps</span></div>
</section>
<script>
const IMG=(new URLSearchParams(location.search)).get('img')||'base3-mesh.png';
const cv=document.getElementById('gl');
const gl=cv.getContext('webgl',{antialias:false,alpha:false,powerPreference:'high-performance'});
(function(){let r='';try{const e=gl.getExtension('WEBGL_debug_renderer_info');r=(e?gl.getParameter(e.UNMASKED_RENDERER_WEBGL):gl.getParameter(gl.RENDERER))||'';}catch(_){}
  const ua=navigator.userAgent,touch=navigator.maxTouchPoints||0;let name;
  if(/iPhone/.test(ua))name='iPhone';
  else if(/iPad/.test(ua)||(/Macintosh/.test(ua)&&touch>1))name='iPad';
  else if(/Android/.test(ua))name=/Mobile/.test(ua)?'Android phone':'Android tablet';
  else if(/Apple/i.test(r)||/Mac/i.test(navigator.platform||'')){const m=r.match(/Apple\s+(M\d\w*)/i);name=m?('MacBook · '+m[1].toUpperCase()):'Mac';}
  else{const g=r.replace(/ANGLE|Direct3D11|OpenGL|\(.*?\)|vs_5_0|ps_5_0/gi,'').replace(/\s+/g,' ').trim();name=g?g.slice(0,40):'GPU';}
  document.getElementById('dev').textContent=name;})();

/* ---------- background: Higgsfield image, gently alive (parallax + grain) ---------- */
const VERT=`attribute vec2 p;varying vec2 vUv;void main(){vUv=p*0.5+0.5;gl_Position=vec4(p,0.,1.);}`;
const FRAG=`precision highp float;uniform sampler2D uTex;uniform float uTime;uniform vec2 uRes;uniform vec2 uMouse;uniform vec2 uImg;varying vec2 vUv;
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
void main(){float sa=uRes.x/uRes.y,ia=uImg.x/uImg.y;vec2 uv=vUv;uv.y=1.-uv.y;
vec2 sc=sa>ia?vec2(1.,ia/sa):vec2(sa/ia,1.);uv=(uv-0.5)*sc+0.5;
vec2 m=uMouse-0.5;float zoom=1.0-0.035-0.01*sin(uTime*0.4);uv=(uv-0.5)*zoom+0.5-m*0.02;
vec3 col=texture2D(uTex,uv).rgb;
float sweep=smoothstep(0.0,0.5,sin((uv.x+uv.y)*2.2-uTime*0.5)*0.5+0.5);col+=vec3(0.10,0.83,0.71)*sweep*0.04;
col+=(hash(vUv*uRes.xy+uTime)-0.5)*0.03;col*=1.0-0.26*length(vUv-0.5);gl_FragColor=vec4(col,1.0);}`;
function sh(t,s){const o=gl.createShader(t);gl.shaderSource(o,s);gl.compileShader(o);if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(o));return o;}
const prog=gl.createProgram();gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));gl.linkProgram(prog);gl.useProgram(prog);
const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const loc=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
const U={t:gl.getUniformLocation(prog,'uTime'),r:gl.getUniformLocation(prog,'uRes'),m:gl.getUniformLocation(prog,'uMouse'),img:gl.getUniformLocation(prog,'uImg'),tex:gl.getUniformLocation(prog,'uTex')};
const tex=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,tex);gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,1,1,0,gl.RGBA,gl.UNSIGNED_BYTE,new Uint8Array([5,10,20,255]));
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
let imgWH=[16,9];const im=new Image();im.crossOrigin='anonymous';im.onload=()=>{imgWH=[im.width,im.height];gl.bindTexture(gl.TEXTURE_2D,tex);gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,im);};im.src=IMG;
const DPR=Math.min(devicePixelRatio||1,2);
function rsz(){cv.width=innerWidth*DPR;cv.height=innerHeight*DPR;gl.viewport(0,0,cv.width,cv.height);}
addEventListener('resize',rsz);rsz();
const mo={x:.5,y:.5},tg={x:.5,y:.5};
addEventListener('pointermove',e=>{tg.x=e.clientX/innerWidth;tg.y=1-e.clientY/innerHeight;},{passive:true});
let last=performance.now(),frC=0,acc=0,fpsEl=document.getElementById('fps');
function glLoop(now){mo.x+=(tg.x-mo.x)*.05;mo.y+=(tg.y-mo.y)*.05;
  gl.useProgram(prog);gl.uniform1f(U.t,now*0.001);gl.uniform2f(U.r,cv.width,cv.height);gl.uniform2f(U.m,mo.x,mo.y);gl.uniform2f(U.img,imgWH[0],imgWH[1]);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,tex);gl.uniform1i(U.tex,0);gl.drawArrays(gl.TRIANGLES,0,3);
  frC++;acc+=now-last;last=now;if(acc>=500){fpsEl.textContent=Math.round(frC/(acc/1000))+' fps';frC=0;acc=0;}requestAnimationFrame(glLoop);}
requestAnimationFrame(glLoop);

/* ---------- foreground: interactive node mesh (ignites on hover, signal propagates) ---------- */
const mc=document.getElementById('mesh'),ctx=mc.getContext('2d');
const TEAL=[45,212,182],AMBER=[238,122,60];
const mix=(a,b,t)=>[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];
const rgba=(c,al)=>`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${al})`;
let nodes=[],edges=[],W=0,H=0;
function build(){
  W=mc.width=innerWidth;H=mc.height=innerHeight;
  const target=Math.min(220,Math.max(90,(W*H)/9000));
  const cols=Math.max(4,Math.round(Math.sqrt(target*W/H))),rows=Math.max(3,Math.round(target/cols));
  const cw=W/cols,ch=H/rows;nodes=[];
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
    nodes.push({x:(x+.5)*cw+(Math.random()-.5)*cw*.75,y:(y+.5)*ch+(Math.random()-.5)*ch*.75,a:0,base:0,nb:[]});}
  nodes.forEach(n=>n.base=n.x/W);
  const R=Math.max(cw,ch)*1.5;edges=[];
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;if(dx*dx+dy*dy<R*R){edges.push([i,j]);nodes[i].nb.push(j);nodes[j].nb.push(i);}}
}
build();addEventListener('resize',build);
const ms={x:-9999,y:-9999};
addEventListener('pointermove',e=>{ms.x=e.clientX;ms.y=e.clientY;},{passive:true});
addEventListener('pointerleave',()=>{ms.x=ms.y=-9999;});
function meshLoop(){
  const IR=115,IR2=IR*IR;
  for(const n of nodes){const dx=n.x-ms.x,dy=n.y-ms.y;if(dx*dx+dy*dy<IR2)n.a=1;}
  const prev=nodes.map(n=>n.a);
  for(let i=0;i<nodes.length;i++){let m=prev[i]*0.90;const nb=nodes[i].nb;for(let k=0;k<nb.length;k++){const v=prev[nb[k]]*0.85;if(v>m)m=v;}nodes[i].a=m<0.002?0:m;}
  ctx.clearRect(0,0,W,H);
  // connections
  ctx.lineWidth=1;
  for(const [i,j] of edges){
    const a=Math.max(nodes[i].a,nodes[j].a);const t=(nodes[i].base+nodes[j].base)*.5;
    const c=mix(mix(TEAL,AMBER,t),mix(AMBER,TEAL,t),a);
    ctx.strokeStyle=rgba(c,0.045+a*0.55);ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();
  }
  // nodes + colored glow on ignited ones
  ctx.globalCompositeOperation='lighter';
  for(const n of nodes){
    const c=mix(mix(TEAL,AMBER,n.base),mix(AMBER,TEAL,n.base),n.a);
    if(n.a>0.06){const gr=16+n.a*60;const rg=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,gr);
      rg.addColorStop(0,rgba(c,0.30+n.a*0.45));rg.addColorStop(1,rgba(c,0));ctx.fillStyle=rg;ctx.fillRect(n.x-gr,n.y-gr,gr*2,gr*2);}
    ctx.globalAlpha=0.30+n.a*0.7;ctx.fillStyle=rgba(c,1);
    ctx.beginPath();ctx.arc(n.x,n.y,1.5+n.a*2.6,0,6.2832);ctx.fill();ctx.globalAlpha=1;
  }
  ctx.globalCompositeOperation='source-over';
  requestAnimationFrame(meshLoop);
}
requestAnimationFrame(meshLoop);
</script>
</body>
</html>
