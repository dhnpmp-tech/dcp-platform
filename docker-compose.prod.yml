---
# DCP Platform - Production Docker Compose
#
# Deploys:
# - Frontend (Next.js)
# - Backend API (Express + SQLite)
# - Health/monitoring endpoints
#
# NOTE: The backend uses SQLite (better-sqlite3), NOT PostgreSQL.
# The SQLite database file is persisted in the backend-db named volume.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down

version: '3.9'

services:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Frontend — Next.js Application
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NODE_ENV: production
    container_name: dc1-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      BACKEND_URL: http://backend:8083
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=frontend"
    networks:
      - dc1-prod
    labels:
      app: dcp
      service: frontend
      tier: frontend

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Backend API — Express + SQLite
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: dc1-backend
    restart: always
    ports:
      - "8083:8083"
    environment:
      NODE_ENV: production
      DC1_PROVIDER_PORT: 8083
      # SQLite database path — persisted in named volume
      DC1_DB_PATH: /app/data/providers.db
      # Required secrets — set these in .env on the VPS
      DC1_ADMIN_TOKEN: ${DC1_ADMIN_TOKEN}
      DC1_HMAC_SECRET: ${DC1_HMAC_SECRET}
      # Required non-secret endpoint for provider WireGuard bootstrap configs
      WG_SERVER_ENDPOINT: ${WG_SERVER_ENDPOINT:?WG_SERVER_ENDPOINT must be set, e.g. vpn.dcp.sa:51820}
      # Optional — set for payment processing
      MOYASAR_SECRET_KEY: ${MOYASAR_SECRET_KEY:-}
      MOYASAR_WEBHOOK_SECRET: ${MOYASAR_WEBHOOK_SECRET:-}
      # Optional — set for transactional emails
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      # Optional — set for Telegram health alerts
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # CORS + frontend URL
      FRONTEND_URL: ${FRONTEND_URL:-https://dcp.sa}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://dcp.sa,https://www.dcp.sa}
      BACKEND_URL: ${BACKEND_URL:-https://api.dcp.sa}
      # Optional — on-chain escrow (leave empty to use off-chain SQLite escrow)
      ESCROW_CONTRACT_ADDRESS: ${ESCROW_CONTRACT_ADDRESS:-}
      ESCROW_ORACLE_PRIVATE_KEY: ${ESCROW_ORACLE_PRIVATE_KEY:-}
      BASE_RPC_URL: ${BASE_RPC_URL:-https://sepolia.base.org}
      # Docker socket for job container management
      DOCKER_HOST: unix:///var/run/docker.sock
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - backend-db:/app/data
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service=backend"
    networks:
      - dc1-prod
    labels:
      app: dcp
      service: backend
      tier: api
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Monitoring & Health Check Service
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  healthcheck:
    build:
      context: ./scripts/healthcheck
      dockerfile: Dockerfile
    container_name: dc1-healthcheck
    restart: always
    ports:
      - "9090:9090"
    environment:
      HEALTHCHECK_PORT: 9090
      FRONTEND_URL: http://frontend:3000
      BACKEND_URL: http://backend:8083
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
        labels: "service=healthcheck"
    networks:
      - dc1-prod
    labels:
      app: dcp
      service: monitoring
      tier: ops

volumes:
  # SQLite database — must survive container restarts and redeploys
  backend-db:
    driver: local
  backend-logs:
    driver: local

networks:
  dc1-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
